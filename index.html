        poopGauge: state.poopGauge,
        forageReturnAt: state.forageReturnAt,
        forageCount: state.forageCount,
        forageType: state.forageType,
        flowerSeeds: state.flowerSeeds,
        flowerBed: state.flowerBed,
        harvestedFlowers: state.harvestedFlowers,
        toyStats: state.toyStats,
        missionStats: state.missionStats,
        discoveredMissions: state.discoveredMissions,
        learnedWords: state.learnedWords,
        loginDates: state.loginDates,
        morningDates: state.morningDates,
        nightDates: state.nightDates,
        manualTimeMode: state.manualTimeMode,
        lastSeenAt: Date.now()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }

    function localDateKey(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function addUniqueDate(list, key) {
      if (!list.includes(key)) list.push(key);
      return list.slice(-40);
    }

    function countConsecutiveDates(list) {
      const unique = [...new Set(list)].sort().reverse();
      if (!unique.length) return 0;
      let count = 1;
      let cursor = new Date(`${unique[0]}T12:00:00`);
      for (let i = 1; i < unique.length; i += 1) {
        const expected = new Date(cursor);
        expected.setDate(expected.getDate() - 1);
        if (localDateKey(expected) !== unique[i]) break;
        count += 1;
        cursor = expected;
      }
      return count;
    }

    function recordSession() {
      const now = new Date();
      const today = localDateKey(now);
      state.loginDates = addUniqueDate(state.loginDates, today);
      if (now.getHours() >= 5 && now.getHours() < 10) state.morningDates = addUniqueDate(state.morningDates, today);
      if (now.getHours() >= 19 || now.getHours() < 2) state.nightDates = addUniqueDate(state.nightDates, today);
      const previous = Number(persistedState.lastSeenAt || 0);
      if (previous && Date.now() - previous >= 24 * 60 * 60 * 1000) state.missionStats.away24h = true;
      saveState();
    }

    function buildFurniturePlace(name) {
      const furniture = state.furnitureState[name];
      const offset = landingOffsets[name];
      const meta = placeMeta[name];
      const x = furniture.x + offset.x;
      const y = furniture.y + offset.y;
      return {
        x,
        y,
        scale: meta.scale,
        width: meta.width,
        height: meta.height || meta.width,
        bubbleX: x + meta.bubble.x,
        bubbleY: y + meta.bubble.y,
        zzzX: x + meta.zzz.x,
        zzzY: y + meta.zzz.y
      };
    }

    function updatePlaces() {
      places = {
        perch: buildFurniturePlace("perch"),
        bed: buildFurniturePlace("bed"),
        food: buildFurniturePlace("food"),
        swing: buildFurniturePlace("swing"),
        toy: buildFurniturePlace("toy"),
        toy2: buildFurniturePlace("toy2"),
        ...floorPlaces
      };
    }

    function applyFurniturePositions() {
      Object.entries(state.furnitureState).forEach(([name, position]) => {
        document.querySelectorAll(`[data-furniture="${name}"]`).forEach(node => {
          node.style.setProperty("--x", `${position.x}%`);
          node.style.setProperty("--y", `${position.y}%`);
          node.style.setProperty("--w", `${furnitureSizes[name]}%`);
          node.style.display = state.furnitureVisible[name] ? "block" : "none";
        });
      });
      updatePlaces();
    }

    function isFurnitureAvailable(name) {
      return state.furnitureVisible[name] !== false;
    }

    function renderInventory() {
      inventoryGrid.innerHTML = inventoryDefinitions.map(item => {
        const visible = item.owned && isFurnitureAvailable(item.id);
        return `
          <article class="inventory-item ${item.owned ? "" : "locked"}">
            <div class="inventory-name"><span>${item.icon}</span><span>${item.name}</span></div>
            ${item.owned ? `
              <div class="inventory-actions">
                <button data-inventory-toggle="${item.id}">${visible ? "しまう" : "出す"}</button>
                <button class="secondary" data-inventory-move="${item.id}" ${visible ? "" : "disabled"}>移動</button>
              </div>
            ` : `<div class="inventory-name">未入手</div>`}
          </article>
        `;
      }).join("");
    }

    function openInventory() {
      renderInventory();
      inventoryPanel.classList.add("open");
    }

    function closeInventory() {
      inventoryPanel.classList.remove("open");
    }

    function toggleFurniture(name) {
      const wasVisible = isFurnitureAvailable(name);
      state.furnitureVisible[name] = !isFurnitureAvailable(name);
      if (!wasVisible && state.furnitureVisible[name] && state.toyStats[name]) {
        state.toyStats[name].placedAt = Date.now();
      }
      if (name === "swing" && !state.furnitureVisible[name]) stopSwingRide();
      if (!state.furnitureVisible[name] && state.place === name) {
        setBirdAt(isFurnitureAvailable("perch") ? "perch" : "floorCenter");
        setBirdMode("normal");
      }
      applyFurniturePositions();
      renderInventory();
      saveState();
    }

    function startFurnitureEditing(name) {
      if (!isFurnitureAvailable(name)) return;
      if (name === "swing") stopSwingRide();
      editingFurniture = name;
      closeInventory();
      screens.home.classList.add("furniture-editing");
      document.querySelectorAll(`[data-furniture="${name}"]`).forEach(node => node.classList.add("is-editing"));
      placementDone.classList.add("show");
      showBubble("ここにする？", 1300);
    }

    function finishFurnitureEditing() {
      if (!editingFurniture) return;
      document.querySelectorAll(`[data-furniture="${editingFurniture}"]`).forEach(node => node.classList.remove("is-editing"));
      editingFurniture = null;
      furnitureDrag = null;
      screens.home.classList.remove("furniture-editing");
      placementDone.classList.remove("show");
      saveState();
      showBubble("できた", 1100);
    }

    function updateDraggedFurniture(clientX, clientY) {
      if (!editingFurniture) return;
      const rect = screens.home.getBoundingClientRect();
      const x = clamp(((clientX - rect.left) / rect.width) * 100, 12, 88);
      const y = clamp(((clientY - rect.top) / rect.height) * 100, 15, 78);
      state.furnitureState[editingFurniture] = { x, y };
      applyFurniturePositions();
      if (state.place === editingFurniture) setBirdAt(editingFurniture);
    }

    function missionCategory(mission) {
      if (mission.id.startsWith("feed")) return "food";
      if (mission.id.startsWith("clean")) return "clean";
      if (mission.id.startsWith("shop") || mission.id === "natural_room") return "shop";
      if (["swing_20", "toy_1", "toy_5", "home_60", "home_180"].includes(mission.id)) return "life";
      return "observe";
    }

    function missionIcon(mission) {
      const category = missionCategory(mission);
      if (mission.id.startsWith("pet")) return "🖐️";
      if (mission.id.startsWith("toy")) return "🧸";
      if (mission.id.startsWith("bird_tap")) return "🦜";
      return { food: "🍚", clean: "🧹", observe: "🦜", life: "🏠", shop: "🛒" }[category];
    }

    function toyFamiliarityStage(name) {
      const stats = state.toyStats[name] || defaultToyStats[name];
      const ageStage = clamp(Math.floor((Date.now() - stats.placedAt) / TOY_DAY_MS) + 1, 1, 4);
      let touchStage = 1;
      if (stats.familiarity >= 20) touchStage = 2;
      if (stats.familiarity >= 45) touchStage = 3;
      if (stats.familiarity >= 75) touchStage = 4;
      return Math.max(ageStage, touchStage);
    }

    function addToyFamiliarity(name, amount) {
      const stats = state.toyStats[name];
      if (!stats) return;
      stats.familiarity = clamp(stats.familiarity + amount, 0, 100);
      saveState();
    }

    function recordToyPlay(name, familiarityGain = 2) {
      const stats = state.toyStats[name];
      if (!stats) return;
      stats.playCount += 1;
      stats.familiarity = clamp(stats.familiarity + familiarityGain, 0, 100);
      stats.lastUsedAt = Date.now();
      saveState();
    }

    function recordPlaceDwell(placeName) {
      const stats = state.toyStats[placeName];
      if (!stats) return;
      stats.dwellMs += Math.max(0, Date.now() - placeEnteredAt);
    }

    function renderToyRanking() {
      const labels = { swing: "ブランコ", toy: "木のおもちゃ", toy2: "鳥型の車輪おもちゃ", bed: "ベッド" };
      const ranking = Object.keys(labels).map(name => {
        const stats = state.toyStats[name];
        const score = stats.familiarity + (stats.playCount * 12) + Math.min(30, stats.dwellMs / 60000 * 2);
        const stars = clamp(Math.ceil(score / 25), 1, 5);
        return { name, label: labels[name], stats, score, stars };
      }).sort((a, b) => b.score - a.score);
      toyRanking.innerHTML = ranking.map((item, index) => `
        <div class="toy-rank-row">
          <span class="toy-rank-number">${index + 1}位</span>
          <div>
            <div class="toy-rank-name">${item.label}</div>
            <div class="toy-rank-note">遊んだ回数 ${item.stats.playCount}回・慣れ度 ${Math.round(item.stats.familiarity)}%${item.stats.lastUsedAt ? `・最近 ${new Date(item.stats.lastUsedAt).toLocaleDateString("ja-JP")}` : ""}</div>
          </div>
          <span class="toy-rank-stars" aria-label="${item.stars}つ星">${"★".repeat(item.stars)}${"☆".repeat(5 - item.stars)}</span>
        </div>
      `).join("");
    }

    function renderDiscoveries() {
      const found = missionDefinitions.filter(mission => state.discoveredMissions.includes(mission.id));
      discoveryCount.textContent = `発見した行動 ${found.length} / ${TOTAL_DISCOVERIES}`;
      const categories = [
        { id: "food", label: "🍚 ごはん" },
        { id: "clean", label: "🧹 お掃除" },
        { id: "observe", label: "🦜 観察" },
        { id: "life", label: "🏠 暮らし" },
        { id: "shop", label: "🛒 ショップ" }
      ];
      discoveryList.innerHTML = found.length ? categories.map(category => {
        const missions = found.filter(mission => missionCategory(mission) === category.id);
        if (!missions.length) return "";
        return `
          <section class="discovery-category">
            <h3>${category.label}</h3>
            <div class="discovery-grid">
              ${missions.map(mission => {
                const milestone = mission.description.match(/\d+/)?.[0] || "✓";
                return `
                  <article class="discovery-card compact">
                    <span class="discovery-badge">${milestone}</span>
                    <div class="discovery-icon">${missionIcon(mission)}</div>
                    <strong>${mission.title}</strong>
                    <span>${mission.description}</span>
                  </article>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }).join("") : `<div class="empty-discovery">まだ何も見つかっていません。<br>もっちんと色々な時間を過ごしてみよう。</div>`;
      learnedWordsNode.innerHTML = state.learnedWords.length
        ? state.learnedWords.map(word => `<span class="word-chip">${word}</span>`).join("")
        : `<div class="empty-discovery">まだ言葉を覚えていません。</div>`;
      renderToyRanking();
      missionNotice.style.display = found.length ? "block" : "none";
    }

    function learnWord(word) {
      if (!word || state.learnedWords.includes(word)) return;
      state.learnedWords.push(word);
    }

    function checkMissions() {
      missionDefinitions.forEach(mission => {
        if (state.discoveredMissions.includes(mission.id) || !mission.check()) return;
        state.discoveredMissions.push(mission.id);
        learnWord(mission.word);
        rewardQueue.push(mission);
      });
      renderDiscoveries();
      saveState();
      playNextReward();
    }

    function playPopSound(delay = 0) {
      window.setTimeout(() => {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;
          const audio = new AudioContextClass();
          const oscillator = audio.createOscillator();
          const gain = audio.createGain();
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(520, audio.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(760, audio.currentTime + .08);
          gain.gain.setValueAtTime(.08, audio.currentTime);
          gain.gain.exponentialRampToValueAtTime(.001, audio.currentTime + .12);
          oscillator.connect(gain).connect(audio.destination);
          oscillator.start();
          oscillator.stop(audio.currentTime + .13);
        } catch {}
      }, delay);
    }

    function playNextReward() {
      if (rewardPlaying || !rewardQueue.length) return;
      rewardPlaying = true;
      const mission = rewardQueue.shift();
      const place = places[state.place] || places.perch;
      rewardLayer.style.setProperty("--reward-x", `${place.x}%`);
      rewardLayer.style.setProperty("--reward-y", `${Math.max(12, place.y - 13)}%`);
      rewardCopy.textContent = `「${mission.title}」発見！ 木の実 +${mission.reward}`;
      rewardNuts.innerHTML = Array.from({ length: 5 }, (_, index) => `
        <img class="reward-nut" src="assets/home/seed.png" alt="" style="--delay:${.35 + index * .13}s; --spread:${(index - 2) * 14}px" />
      `).join("");
      rewardLayer.classList.remove("show");
      void rewardLayer.offsetWidth;
      rewardLayer.classList.add("show");
      playPopSound(650);
      playPopSound(880);
      window.setTimeout(() => {
        state.nuts += mission.reward;
        renderNuts();
        if (mission.word) showBubble(mission.word, 1800);
      }, 1250);
      window.setTimeout(() => {
        rewardLayer.classList.remove("show");
        rewardNuts.innerHTML = "";
        rewardPlaying = false;
        playNextReward();
      }, 2300);
    }

    function showScreen(name) {
      const isDiscovery = name === "discovery" || name === "book";
      closeInventory();
      if (name !== "garden") closeSeedPanel();
      if (name !== "home" && editingFurniture) finishFurnitureEditing();
      if (name === "shop") state.missionStats.shopVisits += 1;
      if (isDiscovery) state.missionStats.discoveryViews += 1;
      screens.home.classList.toggle("active", name === "home");
      screens.garden.classList.toggle("active", name === "garden");
      screens.shop.classList.toggle("active", name === "shop");
      screens.discovery.classList.toggle("active", isDiscovery);
      screens.placeholder.classList.toggle("active", !["home", "garden", "shop", "book", "discovery"].includes(name));
      phone.classList.toggle("garden-open", name === "garden");
      document.querySelectorAll(".nav-item").forEach(item => {
        item.classList.toggle("active", item.dataset.screen === name || (isDiscovery && item.dataset.screen === "book"));
      });
      if (!["home", "garden", "shop", "book", "discovery"].includes(name)) {
        const labels = { interior: "インテリア", letter: "通信" };
        placeholderTitle.textContent = labels[name] || "仮画面";
      }
      if (name === "garden") {
        restoreForageState();
        renderFlowerBed();
      }
      if (isDiscovery) {
        renderDiscoveries();
        missionNotice.style.display = "none";
      }
      moodPanel.classList.remove("open");
      moodButton.setAttribute("aria-expanded", "false");
      checkMissions();
      if (isDiscovery) missionNotice.style.display = "none";
    }

    function setDots(id, value, className) {
      const node = document.querySelector(id);
      node.innerHTML = "";
      for (let i = 0; i < 5; i += 1) {
        const dot = document.createElement("span");
        if (i < value) dot.className = `on ${className}`;
        node.appendChild(dot);
      }
    }

    function renderMood() {
      setDots("#moodDots", state.mood, "good");
      setDots("#hungerDots", state.hunger, "food");
      setDots("#sleepDots", state.sleep, "sleep");
      setDots("#cleanDots", state.clean, "clean");
      saveState();
    }

    function setBirdMode(mode) {
      state.mode = mode;
      birdImage.src = birdImages[mode] || birdImages.normal;
      liveBird.style.setProperty("--mode-y-offset", `${birdModeYOffset[mode] || 0}px`);
      liveBird.classList.toggle("is-flying", mode.startsWith("fly"));
      liveBird.classList.toggle("is-breathing", mode === "normal" || mode === "sleeping");
      liveBird.classList.remove("is-yawning");
      if (mode !== "fluff") {
        liveBird.classList.remove("is-fluffing", "is-fluff-holding", "is-fluff-relaxing");
      }
      if (mode === "yawn") {
        void liveBird.offsetWidth;
        liveBird.classList.add("is-yawning");
      }
      if (mode === "attack") {
        liveBird.style.setProperty("--bird-w", "132px");
        liveBird.style.setProperty("--bird-h", "66px");
      } else if (mode === "kick") {
        liveBird.style.setProperty("--bird-w", "112px");
        liveBird.style.setProperty("--bird-h", "86px");
      } else if (mode === "drinking") {
        liveBird.style.setProperty("--bird-w", "116px");
        liveBird.style.setProperty("--bird-h", "78px");
      } else if (mode === "walk" || mode === "walk2") {
        liveBird.style.setProperty("--bird-w", "94px");
        liveBird.style.setProperty("--bird-h", "76px");
      } else {
        const place = places[state.place] || places.perch;
        liveBird.style.setProperty("--bird-w", `${place.width}px`);
        liveBird.style.setProperty("--bird-h", `${place.height || place.width}px`);
      }
      zzzEffect.classList.toggle("show", mode === "sleeping");
    }

    function clearBehaviorTimers() {
      behaviorTimers.forEach(timer => window.clearTimeout(timer));
      behaviorTimers = [];
      window.clearInterval(walkFrameTimer);
      walkFrameTimer = 0;
    }

    function later(delay, task) {
      const timer = window.setTimeout(task, delay);
      behaviorTimers.push(timer);
      return timer;
    }

    function setBirdAt(placeName) {
      const place = places[placeName];
      const previousPlace = state.place;
      if (previousPlace !== placeName) {
        recordPlaceDwell(previousPlace);
        placeEnteredAt = Date.now();
      }
      state.place = placeName;
      if (placeName === "swing" && previousPlace !== "swing") {
        state.missionStats.swingVisits += 1;
        checkMissions();
      }
      liveBird.style.setProperty("--bird-x", `${place.x}%`);
      liveBird.style.setProperty("--bird-y", `${place.y}%`);
      liveBird.style.setProperty("--bird-scale", place.scale);
      liveBird.style.setProperty("--bird-w", `${place.width}px`);
      liveBird.style.setProperty("--bird-h", `${place.height || place.width}px`);
      birdBubble.style.setProperty("--bubble-x", `${place.bubbleX}%`);
      birdBubble.style.setProperty("--bubble-y", `${place.bubbleY}%`);
      zzzEffect.style.setProperty("--zzz-x", `${place.zzzX}%`);
      zzzEffect.style.setProperty("--zzz-y", `${place.zzzY}%`);
    }

    function startSwingRide() {
      if (!isFurnitureAvailable("swing") || state.place !== "swing") return;
      if (liveBird.parentElement !== swingSeatGroup) swingSeatGroup.appendChild(liveBird);
      swingSeatGroup.classList.add("is-swinging");
      liveBird.classList.add("is-swing-riding");
    }

    function stopSwingRide() {
      swingSeatGroup.classList.remove("is-swinging");
      liveBird.classList.remove("is-swing-riding");
      if (liveBird.parentElement !== birdLayer) {
        birdLayer.appendChild(liveBird);
        setBirdAt(state.place);
      }
    }

    function flightModeFor(from, to) {
      const direction = to.x >= from.x ? "Right" : "Left";
      const movingAway = to.y < from.y - 3;
      return `fly${direction}${movingAway ? "Back" : ""}`;
    }

    function moveBird(placeName, arrivalMode = "normal", travel = "fly") {
      clearBehaviorTimers();
      stopSwingRide();
      const place = places[placeName];
      const currentPlace = places[state.place] || places.perch;
      setBirdMode(travel === "walk" ? "walk" : flightModeFor(currentPlace, place));
      if (travel === "walk") {
        let frame = false;
        walkFrameTimer = window.setInterval(() => {
          frame = !frame;
          setBirdMode(frame ? "walk2" : "walk");
        }, 260);
      }
      setBirdAt(placeName);
      zzzEffect.classList.remove("show");
      liveBird.classList.remove("moving");
      void liveBird.offsetWidth;
      liveBird.classList.add("moving");
      later(travel === "walk" ? 1700 : 1250, () => {
        window.clearInterval(walkFrameTimer);
        walkFrameTimer = 0;
        liveBird.classList.remove("moving");
        setBirdMode(arrivalMode);
        if (placeName === "swing") startSwingRide();
      });
    }

    function showBubble(message, duration = 1700) {
      birdBubble.textContent = message;
      birdBubble.classList.add("show");
      window.clearTimeout(bubbleTimer);
      bubbleTimer = window.setTimeout(() => birdBubble.classList.remove("show"), duration);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 1200);
    }

    function addSparkles(count, around = places.perch) {
      for (let i = 0; i < count; i += 1) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.style.left = `${around.x - 9 + Math.random() * 18}%`;
        spark.style.top = `${around.y - 10 + Math.random() * 18}%`;
        spark.style.animationDelay = `${i * 55}ms`;
        sparkles.appendChild(spark);
        spark.addEventListener("animationend", () => spark.remove());
      }
    }

    function renderPoops() {
      state.poops = state.poops.slice(-MAX_POOPS);
      updateCleanFromPoops();
      poopLayer.innerHTML = state.poops.map((poop, index) => `
        <button class="poop-mark" data-poop-index="${index}" aria-label="フンをティッシュで拭く" style="--poop-x:${poop.x}%; --poop-y:${poop.y}%; --poop-size:${poop.size || 24}px;">
          <img src="${birdImages.poop}" alt="" />
        </button>
      `).join("");
      saveState();
    }

    function showLifeFeedback(message, x, y) {
      lifeFeedback.textContent = message;
      lifeFeedback.style.setProperty("--feedback-x", `${x}%`);
      lifeFeedback.style.setProperty("--feedback-y", `${y}%`);
      lifeFeedback.classList.remove("show");
      void lifeFeedback.offsetWidth;
      lifeFeedback.classList.add("show");
      window.clearTimeout(lifeFeedbackTimer);
      lifeFeedbackTimer = window.setTimeout(() => lifeFeedback.classList.remove("show"), 1200);
    }

    function setTissueState(nextState) {
      tissueState = nextState;
      phone.classList.toggle("holding-tissue", nextState !== "none");
      heldTissue.classList.toggle("show", nextState !== "none");
      heldTissue.classList.toggle("used", nextState === "used");
    }

    function cleanPoop(index) {
      const poop = state.poops[index];
      if (!poop) return;
      if (tissueState === "none") {
        showLifeFeedback("ティッシュを取ろう", poop.x, poop.y - 4);
        return;
      }
      showLifeFeedback("ぷにゅ", poop.x, poop.y - 3);
      state.poops.splice(index, 1);
      state.missionStats.cleanPressCount += 1;
      state.missionStats.cleanedPoops += 1;
      setTissueState("used");
      renderPoops();
      renderMood();
      checkMissions();
    }

    function updateCleanFromPoops() {
      const count = state.poops.length;
      if (count <= 4) state.clean = 5;
      else if (count <= 9) state.clean = 4;
      else if (count <= 14) state.clean = 3;
      else if (count <= 19) state.clean = 2;
      else state.clean = 1;
    }

    function createPoop() {
      const place = places[state.place] || places.perch;
      const poopOffsets = {
        perch: { x: 0, y: 5 },
        bed: { x: -1, y: 5 },
        food: { x: 1, y: 5 },
        swing: { x: 0, y: 5 },
        toy: { x: -1, y: 4 },
        floorLeft: { x: 1, y: 4 },
        floorCenter: { x: 1, y: 4 },
        floorRight: { x: 1, y: 4 }
      };
      const offset = poopOffsets[state.place] || { x: 0, y: 5 };
      const x = clamp(place.x + offset.x + randomBetween(-2, 2), 10, 90);
      const y = clamp(place.y + offset.y + randomBetween(-1, 2), 12, 86);
      state.poops.push({ x, y, size: randomBetween(26, 36) });
      state.poops = state.poops.slice(-MAX_POOPS);
      renderPoops();
      renderMood();
    }

    function performPoop() {
      if (isPooping) return;
      isPooping = true;
      state.poopGauge = 0;
      setBirdMode(state.mode === "sleeping" ? "sleeping" : "normal");
      showBubble("・・・", 650);
      window.setTimeout(() => {
        createPoop();
        showBubble(poopLines[Math.floor(Math.random() * poopLines.length)], 1600);
        isPooping = false;
        saveState();
      }, 500);
    }

    function gainPoopGauge(amount) {
      if (isPooping) return;
      state.poopGauge = Math.min(POOP_THRESHOLD + 40, state.poopGauge + amount);
      if (state.poopGauge >= POOP_THRESHOLD) performPoop();
      else saveState();
    }

    function startPoopGaugeTimer() {
      window.clearInterval(poopTimer);
      poopTimer = window.setInterval(() => {
        if (screens.home.classList.contains("active") && state.forageReturnAt <= Date.now()) gainPoopGauge(POOP_TIME_GAIN);
      }, POOP_TICK_MS);
    }

    function randomPlace() {
      const keys = Object.keys(places).filter(key => key !== state.place);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    function nextLifeAction() {
      if (state.hunger <= 1 && isFurnitureAvailable("food")) return { type: "eat" };
      if (state.sleep <= 1 && isFurnitureAvailable("bed")) return { type: "sleep" };
      if (state.mood <= 1 && isFurnitureAvailable("toy") && toyFamiliarityStage("toy") >= 4) return { type: "toy" };
      const actions = [
        { type: "preen", weight: 16 },
        { type: "floorWalk", weight: 22 }
      ];
      if (isFurnitureAvailable("perch")) actions.push({ type: "perch", weight: 24 });
      if (isFurnitureAvailable("food")) actions.push({ type: "eat", weight: 12 }, { type: "drink", weight: 10 });
      if (isFurnitureAvailable("swing")) actions.push({ type: "swing", weight: 10 });
      if (isFurnitureAvailable("toy")) {
        const toyStage = toyFamiliarityStage("toy");
        if (toyStage === 2) actions.push({ type: "toyObserve", weight: 6 });
        if (toyStage === 3) actions.push({ type: "toyPeck", weight: 7 });
        if (toyStage >= 4) actions.push({ type: "toy", weight: 8 });
      }
      if (isFurnitureAvailable("toy2") && toyFamiliarityStage("toy2") >= 4) {
        actions.push({ type: "toy2", weight: 7 });
      }
      if (isFurnitureAvailable("bed")) actions.push({ type: "sleep", weight: 8 });
      const total = actions.reduce((sum, action) => sum + action.weight, 0);
      let cursor = Math.random() * total;
      for (const action of actions) {
        cursor -= action.weight;
        if (cursor <= 0) return action;
      }
      return { type: "perch" };
    }

    function wobbleToy() {
      toyFigure.classList.remove("wobble");
      void toyFigure.offsetWidth;
      toyFigure.classList.add("wobble");
    }

    function touchToy() {
      if (!isFurnitureAvailable("toy") || editingFurniture) return;
      wobbleToy();
      addToyFamiliarity("toy", 10);
      const stage = toyFamiliarityStage("toy");
      showLifeFeedback("つんつん", state.furnitureState.toy.x, state.furnitureState.toy.y - 5);
      if (stage === 1) showBubble("じー…", 1300);
      else if (stage === 2) showBubble("なにこれ？", 1300);
      else if (stage === 3) showBubble("つついてみる", 1300);
      else showBubble("これすき", 1300);
    }

    function touchToy2() {
      if (!isFurnitureAvailable("toy2") || editingFurniture) return;
      addToyFamiliarity("toy2", 6);
      showLifeFeedback("ころころ？", state.furnitureState.toy2.x, state.furnitureState.toy2.y - 5);
      showBubble(toyFamiliarityStage("toy2") >= 4 ? "けってみる？" : "じー…", 1300);
    }

    function animateToy2Kick() {
      setBirdMode("kick");
      showBubble("えいっ", 1300);
      toy2Figure.classList.remove("rolling");
      void toy2Figure.offsetWidth;
      toy2Figure.classList.add("rolling");
      window.setTimeout(() => toy2Figure.classList.remove("rolling"), 2900);
      gainPoopGauge(POOP_TOY_GAIN);
      later(3000, () => setBirdMode("normal"));
    }

    function animateEating() {
      const frames = ["eat", "normal", "eat", "normal", "eat", "normal"];
      frames.forEach((frame, index) => later(index * 430, () => setBirdMode(frame)));
      gainPoopGauge(POOP_FOOD_GAIN);
    }

    function animatePreening() {
      setBirdMode("preening");
      showBubble("きれいきれい", 1600);
      later(3600, () => setBirdMode("normal"));
    }

    function animateTilt() {
      setBirdMode("tilt");
      if (Math.random() < .45) showBubble("ぴ？", 1100);
      later(1700, () => setBirdMode("normal"));
    }

    function animateStretch() {
      setBirdMode("stretch");
      later(2200, () => setBirdMode("normal"));
    }

    function animateFluff() {
      setBirdMode("fluff");
      liveBird.classList.remove("is-fluffing", "is-fluff-holding", "is-fluff-relaxing");
      void liveBird.offsetWidth;
      liveBird.classList.add("is-fluffing");
      later(1500, () => liveBird.classList.add("is-fluff-holding"));
      later(4500, () => {
        liveBird.classList.remove("is-fluff-holding");
        void liveBird.offsetWidth;
        liveBird.classList.add("is-fluff-relaxing");
      });
      later(6000, () => setBirdMode("normal"));
    }

    function showPetHearts() {
      const place = places[state.place] || places.perch;
      for (let i = 0; i < 5; i += 1) {
        const heart = document.createElement("span");
        heart.className = "pet-heart";
        heart.textContent = "♥";
        heart.style.setProperty("--heart-x", `${place.x + randomBetween(-4, 5)}%`);
        heart.style.setProperty("--heart-y", `${place.y - 5}%`);
        heart.style.setProperty("--heart-drift", `${randomBetween(-18, 18)}px`);
        heart.style.animationDelay = `${i * 90}ms`;
        petHearts.appendChild(heart);
        heart.addEventListener("animationend", () => heart.remove());
      }
    }

    function animatePetting() {
      clearBehaviorTimers();
      liveBird.classList.remove("moving");
      setBirdMode("petting");
      const lines = ["えへへ", "きもちい", "♪", "すりすり", "もっと"];
      showBubble(lines[Math.floor(Math.random() * lines.length)], 1900);
      showPetHearts();
      state.mood = clamp(state.mood + 1);
      later(2600, () => setBirdMode("normal"));
    }

    function animateDrinking() {
      const frames = ["drinking", "normal", "drinking", "normal"];
      frames.forEach((frame, index) => later(index * 520, () => setBirdMode(frame)));
      showBubble("ごくごく", 1300);
    }

    function animateSleep() {
      setBirdMode("yawn");
      showBubble("ねむい", 1400);
      later(1500, () => setBirdMode("sleeping"));
    }

    function animateToyPeck() {
      setBirdMode("attack");
      gainPoopGauge(POOP_TOY_GAIN);
      showBubble("♪", 1500);
      later(250, wobbleToy);
      later(1700, () => setBirdMode("normal"));
    }

    function smallHop() {
      liveBird.classList.remove("is-breathing");
      liveBird.classList.remove("moving");
      void liveBird.offsetWidth;
      liveBird.classList.add("moving");
      later(1600, () => {
        liveBird.classList.remove("moving");
        if (state.mode === "normal") liveBird.classList.add("is-breathing");
      });
    }

    function tinyWalkInPlace() {
      if (!places[state.place]?.isFloor) {
        smallHop();
        return;
      }
      gainPoopGauge(POOP_WALK_GAIN);
      let frame = false;
      setBirdMode("walk");
      const stepTimer = window.setInterval(() => {
        frame = !frame;
        setBirdMode(frame ? "walk2" : "walk");
      }, 260);
      later(1100, () => {
        window.clearInterval(stepTimer);
        setBirdMode("normal");
      });
    }

    function runSmallAction() {
      if (state.forageReturnAt > Date.now()) return;
      if (state.mode.startsWith("fly") || ["walk", "walk2", "attack", "kick", "preening", "eat", "yawn", "tilt", "drinking", "stretch", "fluff", "petting"].includes(state.mode)) return;
      if (state.mode === "sleeping") {
        if (Math.random() < .45) showBubble("すやすや", 1200);
        return;
      }

      const place = state.place;
      const actions = ["bubble", "hop", "tilt", "tilt"];
      const isFloor = Boolean(places[place]?.isFloor);
      if (place === "perch" || place === "swing" || isFloor) actions.push("preen", "stretch");
      if (place === "perch" || place === "bed" || isFloor) actions.push("fluff", "fluff");
      if (place === "food") actions.push("eat", "drink", "drink");
      if (place === "bed") actions.push("yawn");
      if (place === "toy") {
        if (toyFamiliarityStage("toy") >= 3) actions.push("peck");
        else actions.push("tilt", "bubble");
      }
      if (isFloor) actions.push("tinyWalk", "tinyWalk", "stretch");
      if (state.clean <= 2 || state.poops.length >= 10) actions.push("dirty", "dirty");

      const action = actions[Math.floor(Math.random() * actions.length)];
      if (action === "preen") {
        animatePreening();
        return;
      }
      if (action === "tilt") {
        animateTilt();
        return;
      }
      if (action === "stretch") {
        animateStretch();
        return;
      }
      if (action === "fluff") {
        animateFluff();
        return;
      }
      if (action === "drink") {
        animateDrinking();
        return;
      }
      if (action === "eat") {
        animateEating();
        showBubble("もぐもぐ", 1200);
        state.hunger = clamp(state.hunger + 1);
        renderMood();
        return;
      }
      if (action === "yawn") {
        setBirdMode("yawn");
        showBubble("ふぁ…", 1200);
        later(1200, () => setBirdMode(place === "bed" ? "sleeping" : "normal"));
        return;
      }
      if (action === "peck") {
        animateToyPeck();
        return;
      }
      if (action === "tinyWalk") {
        tinyWalkInPlace();
        return;
      }
      if (action === "hop") {
        smallHop();
        return;
      }
      if (action === "dirty") {
        showBubble(dirtyLines[Math.floor(Math.random() * dirtyLines.length)], 1500);
        return;
      }
      showBubble(randomSpeech(), 1200);
    }

    function scheduleSmallAction() {
      window.clearTimeout(smallActionTimer);
      smallActionTimer = window.setTimeout(smallLife, randomBetween(SMALL_ACTION_MIN_MS, SMALL_ACTION_MAX_MS));
    }

    function scheduleMoveAction() {
      window.clearTimeout(moveActionTimer);
      moveActionTimer = window.setTimeout(moveLife, randomBetween(MOVE_ACTION_MIN_MS, MOVE_ACTION_MAX_MS));
    }

    function startHomeStayTimer() {
      window.clearInterval(homeStayTimer);
      homeStayTimer = window.setInterval(() => {
        if (!screens.home.classList.contains("active")) return;
        state.missionStats.homeSeconds += 1;
        if ([60, 180].includes(state.missionStats.homeSeconds)) checkMissions();
        else if (state.missionStats.homeSeconds % 15 === 0) saveState();
      }, 1000);
    }

    function smallLife() {
      if (screens.home.classList.contains("active")) runSmallAction();
      scheduleSmallAction();
    }

    function moveLife() {
      if (screens.home.classList.contains("active") && state.forageReturnAt <= Date.now()) {
        const action = nextLifeAction();
        runLifeAction(action.type);
        state.hunger = clamp(state.hunger - (Math.random() < .55 ? 1 : 0));
        state.sleep = clamp(state.sleep - (Math.random() < .42 ? 1 : 0));
        state.mood = clamp(state.mood - (Math.random() < .3 ? 1 : 0));
        renderMood();
      }
      scheduleMoveAction();
    }

    function runLifeAction(type) {
      if (type === "eat") {
        if (!isFurnitureAvailable("food")) return runLifeAction("floorWalk");
        moveBird("food");
        state.hunger = clamp(state.hunger + 2);
        showBubble("もぐもぐ", 1800);
        later(1300, animateEating);
        return;
      }
      if (type === "drink") {
        if (!isFurnitureAvailable("food")) return runLifeAction("floorWalk");
        moveBird("food", "normal");
        later(1300, animateDrinking);
        return;
      }
      if (type === "sleep") {
        if (!isFurnitureAvailable("bed")) return runLifeAction("perch");
        moveBird("bed", "yawn");
        state.sleep = clamp(state.sleep + 2);
        recordToyPlay("bed", 1);
        later(1300, animateSleep);
        return;
      }
      if (type === "toyObserve") {
        if (!isFurnitureAvailable("toy")) return runLifeAction("floorWalk");
        moveBird("toy", "normal");
        later(1400, () => {
          setBirdMode("tilt");
          showBubble("じー…", 1600);
          addToyFamiliarity("toy", 2);
          later(1700, () => setBirdMode("normal"));
        });
        return;
      }
      if (type === "toyPeck") {
        if (!isFurnitureAvailable("toy")) return runLifeAction("floorWalk");
        moveBird("toy", "attack");
        later(1300, () => {
          animateToyPeck();
          addToyFamiliarity("toy", 4);
        });
        return;
      }
      if (type === "toy") {
        if (!isFurnitureAvailable("toy")) return runLifeAction("floorWalk");
        moveBird("toy", "attack");
        state.mood = clamp(state.mood + 2);
        state.missionStats.toyCount += 1;
        recordToyPlay("toy", 3);
        later(1300, animateToyPeck);
        return;
      }
      if (type === "toy2") {
        if (!isFurnitureAvailable("toy2")) return runLifeAction("floorWalk");
        moveBird("toy2", "kick");
        state.mood = clamp(state.mood + 2);
        state.missionStats.toyCount += 1;
        recordToyPlay("toy2", 3);
        later(1300, animateToy2Kick);
        return;
      }
      if (type === "preen") {
        const floorKeys = ["floorLeft", "floorCenter", "floorRight"];
        let place = floorKeys.includes(state.place) ? state.place : "floorCenter";
        if (!floorKeys.includes(state.place) && isFurnitureAvailable("perch")) place = "perch";
        if (!floorKeys.includes(state.place) && isFurnitureAvailable("swing") && Math.random() < .4) place = "swing";
        moveBird(place, "normal");
        state.mood = clamp(state.mood + 1);
        later(1400, animatePreening);
        return;
      }
      if (type === "floorWalk") {
        const floorKeys = ["floorLeft", "floorCenter", "floorRight"];
        const destination = floorKeys[Math.floor(Math.random() * floorKeys.length)];
        if (!floorKeys.includes(state.place)) {
          moveBird(destination, "walk");
          later(1800, () => {
            const nextFloor = floorKeys.filter(key => key !== destination)[Math.floor(Math.random() * 2)];
            moveBird(nextFloor, "walk", "walk");
            gainPoopGauge(POOP_WALK_GAIN);
          });
          return;
        }
        const nextFloor = floorKeys.filter(key => key !== state.place)[Math.floor(Math.random() * 2)];
        moveBird(nextFloor, "walk", "walk");
        gainPoopGauge(POOP_WALK_GAIN);
        showBubble(randomSpeech(), 1300);
        return;
      }
      if (type === "swing") {
        if (!isFurnitureAvailable("swing")) return runLifeAction("floorWalk");
        moveBird("swing", "normal");
        state.mood = clamp(state.mood + 1);
        recordToyPlay("swing", 2);
        if (Math.random() < .55) later(1600, animatePreening);
        return;
      }
      moveBird(isFurnitureAvailable("perch") ? "perch" : "floorCenter", "normal");
      if (Math.random() < .35) later(1800, animatePreening);
    }

    function renderProducts() {
      const category = categories[state.category];
      categoryTitle.textContent = category.title;
      categoryCopy.textContent = category.copy;
      productGrid.innerHTML = category.items.map((item, index) => `
        <article class="product-card">
          <button class="heart-button" aria-label="${item.name}をお気に入りにする" data-heart>♡</button>
          <h3 class="product-title">${item.name}</h3>
          <div class="product-art ${item.art}"><span>${item.icon}</span></div>
          <p class="product-desc">${item.desc}</p>
          <div class="price"><span class="acorn" aria-hidden="true"></span><span>${item.price}</span></div>
          <button class="buy-button" data-price="${item.price}" data-name="${item.name}">購入する</button>
        </article>
      `).join("");
    }

    function renderSets() {
      setsRow.innerHTML = sets.map(set => `
        <article class="set-card">
          <div class="set-preview"></div>
          <div>
            <h3>${set.name}</h3>
            <div class="set-icons">${set.icons.map(icon => `<span>${icon}</span>`).join("")}</div>
            <div class="set-price"><span class="acorn" aria-hidden="true"></span><strong>${set.price}</strong><span class="badge">10% OFF</span></div>
          </div>
        </article>
      `).join("");
    }

    function renderNuts() {
      nutCount.textContent = state.nuts.toLocaleString("ja-JP");
      homeNutCount.textContent = state.nuts.toLocaleString("ja-JP");
      saveState();
    }

    function flowerBedStage(now = Date.now()) {
      if (!state.flowerBed.plantedAt || !state.flowerBed.seedType) return 0;
      const elapsed = now - state.flowerBed.plantedAt;
      if (elapsed >= FLOWER_STAGE_TIMES[3]) return 3;
      if (elapsed >= FLOWER_STAGE_TIMES[2]) return 2;
      if (elapsed >= FLOWER_STAGE_TIMES[1]) return 1;
      return 0;
    }

    function renderFlowerBed() {
      window.clearTimeout(flowerGrowthTimer);
      const planted = Boolean(state.flowerBed.plantedAt && state.flowerBed.seedType);
      const stage = flowerBedStage();
      flowerBedImage.src = `assets/home/${FLOWER_BED_IMAGES[stage]}`;
      flowerBedButton.classList.toggle("growing", planted && stage < 3);
      flowerBedButton.setAttribute("aria-label", !planted ? "空の花壇" : stage === 3 ? "咲いた花を収穫する" : "育っている花壇");
      if (planted && stage < 3) {
        const nextAt = state.flowerBed.plantedAt + FLOWER_STAGE_TIMES[stage + 1];
        flowerGrowthTimer = window.setTimeout(renderFlowerBed, Math.max(120, nextAt - Date.now() + 30));
      }
    }

    function renderSeedList() {
      seedList.innerHTML = Object.entries(flowerSeedTypes).map(([type, seed]) => {
        const count = Number(state.flowerSeeds[type] || 0);
        return `
          <button class="seed-item" data-seed-type="${type}" ${seedPanelMode === "plant" && count <= 0 ? "disabled" : ""}>
            <img src="assets/home/flower seed.png" alt="" />
            <strong>${seed.name}</strong>
            <span>×${count}${seedPanelMode === "plant" ? "　植える" : ""}</span>
          </button>
        `;
      }).join("");
    }

    function openSeedPanel(mode = "view") {
      seedPanelMode = mode;
      seedPanelTitle.textContent = mode === "plant" ? "植える種を選ぶ" : "花の種一覧";
      renderSeedList();
      seedPanel.classList.add("open");
    }

    function closeSeedPanel() {
      seedPanel.classList.remove("open");
    }

    function plantFlowerSeed(type) {
      if (seedPanelMode !== "plant" || state.flowerBed.plantedAt || !state.flowerSeeds[type]) return;
      state.flowerSeeds[type] -= 1;
      state.flowerBed = { seedType: type, plantedAt: Date.now() };
      closeSeedPanel();
      renderFlowerBed();
      showGardenStatus(`${flowerSeedTypes[type].name}をまいた`, 1800);
      saveState();
    }

    function harvestFlower() {
      if (flowerBedStage() < 3 || !state.flowerBed.seedType) return;
      const type = state.flowerBed.seedType;
      state.harvestedFlowers[type] = Number(state.harvestedFlowers[type] || 0) + 1;
      state.flowerBed = { seedType: null, plantedAt: 0 };
      flowerBedButton.classList.remove("harvesting");
      void flowerBedButton.offsetWidth;
      flowerBedButton.classList.add("harvesting");
      showGardenStatus("お花がとれた", 1800);
      renderFlowerBed();
      saveState();
    }

    function showGardenStatus(message, duration = 1700) {
      gardenStatus.textContent = message;
      gardenStatus.classList.add("show");
      window.clearTimeout(gardenStatusTimer);
      gardenStatusTimer = window.setTimeout(() => gardenStatus.classList.remove("show"), duration);
    }

    function animateGardenSeeds(count, image = "assets/home/seed.png") {
      gardenSeeds.innerHTML = "";
      for (let index = 0; index < Math.min(count, 6); index += 1) {
        const seed = document.createElement("img");
        seed.className = "garden-seed";
        seed.src = image;
        seed.style.setProperty("--seed-delay", `${index * 110}ms`);
        seed.style.setProperty("--seed-x", `${randomBetween(-52, 52)}px`);
        gardenSeeds.appendChild(seed);
      }
      window.setTimeout(() => gardenSeeds.innerHTML = "", 2400);
    }

    function completeForage() {
      window.clearTimeout(forageTimer);
      if (!state.forageReturnAt) return;
      const forageType = state.forageType;
      const found = forageType === "flowers" ? randomBetween(1, 2) : randomBetween(3, 7);
      const flowerTypes = Object.keys(flowerSeedTypes);
      const foundFlowerType = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];
      state.forageReturnAt = 0;
      state.forageCount += 1;
      if (forageType === "flowers") state.flowerSeeds[foundFlowerType] = Number(state.flowerSeeds[foundFlowerType] || 0) + found;
      else state.nuts += found;
      liveBird.classList.remove("is-away");
      forageButton.disabled = false;
      flowerForageButton.disabled = false;
      forageButton.textContent = "木の実を探してきて";
      flowerForageButton.textContent = "花の種を探してきて";
      gardenBird.className = "garden-bird returning";
      gardenBird.src = birdImages.flyRight;
      window.setTimeout(() => {
        gardenBird.className = "garden-bird";
        gardenBird.src = birdImages.normal;
        if (screens.garden.classList.contains("active")) {
          const message = forageType === "flowers"
            ? `${flowerSeedTypes[foundFlowerType].name} ${found}こ`
            : `みつけたよ　${found}こ`;
          showGardenStatus(message, 2200);
          animateGardenSeeds(found, forageType === "flowers" ? "assets/home/flower seed.png" : "assets/home/seed.png");
          renderSeedList();
        } else if (screens.home.classList.contains("active")) {
          showBubble(forageType === "flowers" ? "花の種みつけた" : `みつけたよ　${found}こ`, 2200);
        }
      }, 1450);
      renderNuts();
      saveState();
    }

    function restoreForageState() {
      window.clearTimeout(forageTimer);
      const remaining = state.forageReturnAt - Date.now();
      if (state.forageReturnAt && remaining <= 0) {
        completeForage();
        return;
      }
      const isAway = remaining > 0;
      liveBird.classList.toggle("is-away", isAway);
      gardenBird.className = `garden-bird${isAway ? " away" : ""}`;
      gardenBird.src = isAway ? birdImages.flyRightBack : birdImages.normal;
      forageButton.disabled = isAway;
      flowerForageButton.disabled = isAway;
      forageButton.textContent = isAway && state.forageType === "nuts" ? "探しています…" : "木の実を探してきて";
      flowerForageButton.textContent = isAway && state.forageType === "flowers" ? "探しています…" : "花の種を探してきて";
      if (isAway) forageTimer = window.setTimeout(completeForage, remaining);
    }

    function startForage(type = "nuts") {
      if (state.forageReturnAt > Date.now()) {
        showGardenStatus("いま探してるよ", 1400);
        return;
      }
      state.forageType = type;
      state.forageReturnAt = Date.now() + FORAGE_DURATION_MS;
      forageButton.disabled = true;
      flowerForageButton.disabled = true;
      forageButton.textContent = type === "nuts" ? "探しています…" : "木の実を探してきて";
      flowerForageButton.textContent = type === "flowers" ? "探しています…" : "花の種を探してきて";
      gardenBird.src = birdImages.flyRightBack;
      gardenBird.className = "garden-bird departing";
      liveBird.classList.add("is-away");
      showGardenStatus("いってきます", 1400);
      window.setTimeout(() => gardenBird.className = "garden-bird away", 1400);
      forageTimer = window.setTimeout(completeForage, FORAGE_DURATION_MS);
      saveState();
    }

    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", () => {
        if (state.forageReturnAt > Date.now()) {
          showToast("もっちんは庭へおでかけ中");
          return;
        }
        const action = button.dataset.action;
        state.missionStats.tapCount += 1;
        if (action === "feed") {
          if (!isFurnitureAvailable("food")) {
            showBubble("お皿どこ？", 1300);
            checkMissions();
            return;
          }
          state.missionStats.feedCount += 1;
          state.hunger = clamp(state.hunger + 2);
          moveBird("food");
          showBubble("おいしい");
          later(1300, animateEating);
          showToast("ごはんをあげました");
        }
        if (action === "pet") {
          state.missionStats.petCount += 1;
          animatePetting();
          showToast("もっちんがうれしそう");
        }
        if (action === "toy") {
          if (!isFurnitureAvailable("toy")) {
            showBubble("おもちゃないよ", 1300);
            checkMissions();
            return;
          }
          touchToy();
        }
        renderMood();
        checkMissions();
      });
    });

    document.querySelectorAll("[data-message]").forEach(button => {
      button.addEventListener("click", () => {
        showToast(button.dataset.message);
        addSparkles(5, places[state.place]);
      });
    });

    document.querySelector("#missionButton").addEventListener("click", () => showScreen("discovery"));
    document.querySelector("#discoveryBack").addEventListener("click", () => showScreen("home"));
    doorHotspot.addEventListener("click", () => showScreen("garden"));
    document.querySelector("#gardenBack").addEventListener("click", () => showScreen("home"));
    forageButton.addEventListener("click", () => startForage("nuts"));
    flowerForageButton.addEventListener("click", () => startForage("flowers"));
    flowerSeedBag.addEventListener("click", () => openSeedPanel("view"));
    seedPanelClose.addEventListener("click", closeSeedPanel);
    seedList.addEventListener("click", event => {
      const seed = event.target.closest("[data-seed-type]");
      if (seed) plantFlowerSeed(seed.dataset.seedType);
    });
    flowerBedButton.addEventListener("click", () => {
      if (!state.flowerBed.plantedAt) openSeedPanel("plant");
      else if (flowerBedStage() >= 3) harvestFlower();
      else showGardenStatus("すくすく育ってる", 1400);
    });
    document.querySelector("#inventoryButton").addEventListener("click", openInventory);
    document.querySelector("#inventoryClose").addEventListener("click", closeInventory);
    placementDone.addEventListener("click", finishFurnitureEditing);

    inventoryGrid.addEventListener("click", event => {
      const toggle = event.target.closest("[data-inventory-toggle]");
      const move = event.target.closest("[data-inventory-move]");
      if (toggle) toggleFurniture(toggle.dataset.inventoryToggle);
      if (move) startFurnitureEditing(move.dataset.inventoryMove);
    });

    document.querySelectorAll(".furniture, .swing-seat-group").forEach(node => {
      node.addEventListener("pointerdown", event => {
        if (!editingFurniture || node.dataset.furniture !== editingFurniture) return;
        event.preventDefault();
        furnitureDrag = { pointerId: event.pointerId };
        node.setPointerCapture?.(event.pointerId);
        updateDraggedFurniture(event.clientX, event.clientY);
      });
      node.addEventListener("pointermove", event => {
        if (!furnitureDrag || event.pointerId !== furnitureDrag.pointerId) return;
        updateDraggedFurniture(event.clientX, event.clientY);
      });
      node.addEventListener("pointerup", event => {
        if (!furnitureDrag || event.pointerId !== furnitureDrag.pointerId) return;
        furnitureDrag = null;
        saveState();
      });
    });

    tissueBox.addEventListener("click", () => {
      if (tissueState === "none") {
        setTissueState("clean");
        showLifeFeedback("すっ", 16, 66);
      } else if (tissueState === "used") {
        showLifeFeedback("先にぽいっ", 76, 68);
      }
    });

    poopLayer.addEventListener("click", event => {
      const poop = event.target.closest("[data-poop-index]");
      if (!poop) return;
      cleanPoop(Number(poop.dataset.poopIndex));
    });

    trashBin.addEventListener("click", () => {
      if (tissueState !== "none") {
        const cleanedPoop = tissueState === "used";
        setTissueState("none");
        showLifeFeedback("ぽいっ", 84, 63);
        if (cleanedPoop) {
          showBubble(cleanLines[Math.floor(Math.random() * cleanLines.length)], 1600);
          addSparkles(5, { x: 84, y: 66 });
        }
      }
    });

    phone.addEventListener("pointermove", event => {
      if (tissueState === "none" || !screens.home.classList.contains("active")) return;
      const rect = phone.getBoundingClientRect();
      const x = clamp((event.clientX - rect.left) / rect.width * 100, 6, 94);
      const y = clamp((event.clientY - rect.top) / rect.height * 100, 8, 86);
      heldTissue.style.setProperty("--tissue-x", `${x}%`);
      heldTissue.style.setProperty("--tissue-y", `${y}%`);
      const hoveredPoop = document.elementFromPoint(event.clientX, event.clientY)?.closest?.("[data-poop-index]");
      if (hoveredPoop && poopLayer.contains(hoveredPoop)) {
        cleanPoop(Number(hoveredPoop.dataset.poopIndex));
      }
    });

    toyFigure.addEventListener("click", touchToy);
    toyFigure.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        touchToy();
      }
    });

    toy2Figure.addEventListener("click", touchToy2);
    toy2Figure.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        touchToy2();
      }
    });

    function tapMocchin() {
      state.missionStats.birdTapCount += 1;
      if (state.mode === "normal") animateTilt();
      else showBubble("ぴ", 900);
      checkMissions();
    }

    liveBird.addEventListener("pointerdown", event => {
      if (event.button !== undefined && event.button !== 0) return;
      window.clearTimeout(petHoldTimer);
      suppressBirdClick = false;
      petHoldTimer = window.setTimeout(() => {
        suppressBirdClick = true;
        state.missionStats.petCount += 1;
        animatePetting();
        renderMood();
        checkMissions();
      }, 650);
    });

    liveBird.addEventListener("pointerup", () => window.clearTimeout(petHoldTimer));
    ["pointercancel", "pointerleave"].forEach(type => {
      liveBird.addEventListener(type, () => {
        window.clearTimeout(petHoldTimer);
        suppressBirdClick = false;
      });
    });

    liveBird.addEventListener("click", () => {
      if (suppressBirdClick) {
        suppressBirdClick = false;
        return;
      }
      tapMocchin();
    });
    liveBird.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        tapMocchin();
      }
    });

    document.querySelectorAll(".nav-item").forEach(button => {
      button.addEventListener("click", () => showScreen(button.dataset.screen));
    });

    document.querySelector("#shopBack").addEventListener("click", () => showScreen("home"));

    document.querySelectorAll(".category-tab").forEach(button => {
      button.addEventListener("click", () => {
        state.category = button.dataset.category;
        document.querySelectorAll(".category-tab").forEach(tab => tab.classList.remove("active"));
        button.classList.add("active");
        renderProducts();
      });
    });

    productGrid.addEventListener("click", event => {
      const heart = event.target.closest("[data-heart]");
      if (heart) {
        heart.classList.toggle("active");
        heart.textContent = heart.classList.contains("active") ? "♥" : "♡";
        return;
      }

      const buy = event.target.closest(".buy-button");
      if (!buy) return;
      const price = Number(buy.dataset.price);
      if (state.nuts < price) {
        showToast("木の実が足りません");
        return;
      }
      state.nuts -= price;
      state.purchasedItems.push(buy.dataset.name);
      renderNuts();
      showToast("購入しました");
      checkMissions();
    });

    moodButton.addEventListener("click", () => {
      const isOpen = moodPanel.classList.toggle("open");
      moodButton.setAttribute("aria-expanded", String(isOpen));
    });

    lanternSwitch.addEventListener("click", () => {
      const switchingToNight = !timeTint.classList.contains("night");
      state.manualTimeMode = switchingToNight ? "night" : "day";
      updateTimeOfDay();
      if (switchingToNight && Math.random() < .75) {
        const nightLines = ["おやすみ", "ねる？", "すやすや"];
        showBubble(nightLines[Math.floor(Math.random() * nightLines.length)], 1600);
      }
      saveState();
    });

    document.addEventListener("click", event => {
      if (!moodPanel.contains(event.target) && !moodButton.contains(event.target)) {
        moodPanel.classList.remove("open");
        moodButton.setAttribute("aria-expanded", "false");
      }
    });

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
      updateTimeOfDay(now);
    }

    function updateTimeOfDay(now = new Date()) {
      const hour = now.getHours();
      let period = "night";
      if (hour >= 5 && hour < 10) period = "morning";
      else if (hour >= 10 && hour < 16) period = "day";
      else if (hour >= 16 && hour < 19) period = "evening";
      if (state.manualTimeMode === "night" || state.manualTimeMode === "day") period = state.manualTimeMode;
      timeTint.className = `time-tint ${period}`;
      lanternGlow.classList.toggle("is-off", period !== "night");
      lanternSwitch.classList.toggle("is-lit", period === "night");
    }

    applyFurniturePositions();
    recordSession();
    renderPoops();
    renderMood();
    renderProducts();
    renderSets();
    renderNuts();
    renderDiscoveries();
    renderFlowerBed();
    setBirdAt("perch");
    setBirdMode("normal");
    restoreForageState();
    if (!state.forageReturnAt) showBubble("♪", 1400);
    updateClock();
    window.setInterval(updateClock, 30000);
    startPoopGaugeTimer();
    startHomeStayTimer();
    scheduleSmallAction();
    scheduleMoveAction();
    checkMissions();
  </script>
</body>
</html>
