<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>もっちんの部屋</title>
  <style>
    :root {
      --ink: #5a422d;
      --muted: #806a52;
      --paper: rgba(255, 250, 236, .78);
      --paper-strong: rgba(255, 250, 236, .94);
      --shop-paper: rgba(255, 248, 231, .96);
      --line: rgba(101, 72, 43, .16);
      --green: #76bf68;
      --amber: #f2ad3b;
      --blue: #65b9d1;
      --violet: #9380cc;
      --shadow: 0 12px 30px rgba(73, 52, 29, .16);
      font-family: "Yu Gothic UI", "Hiragino Sans", "Meiryo", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 235, 178, .74), transparent 31%),
        linear-gradient(135deg, #dbe9cf, #f9eedc 52%, #d5e7cf);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid rgba(242, 173, 59, .45);
      outline-offset: 3px;
    }

    .phone {
      position: relative;
      width: min(100vw, 480px);
      aspect-ratio: 9 / 16;
      max-height: 100vh;
      min-height: 720px;
      overflow: hidden;
      background: #efe1ca;
      box-shadow: 0 28px 80px rgba(68, 52, 34, .3);
      isolation: isolate;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
      background: #efe1ca;
    }

    .screen.active {
      display: block;
    }

    .room {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,0) 24%, rgba(43,27,12,.04) 66%, rgba(43,27,12,.32) 100%),
        url("assets/home/room.png");
      background-size: cover;
      background-position: center;
      transform: scale(1.006);
      z-index: 0;
    }

    .furniture-layer,
    .poop-layer,
    .bird-layer,
    .effect-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .furniture-layer { z-index: 2; }
    .bird-layer { z-index: 4; }
    .time-tint { z-index: 6; }
    .effect-layer { z-index: 7; }
    .poop-layer { z-index: 9; }

    .time-tint {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      transition: background 1.2s ease, opacity 1.2s ease;
    }

    .time-tint.morning {
      background: linear-gradient(145deg, rgba(255, 245, 188, .35), rgba(255, 255, 255, .08));
      opacity: .32;
    }

    .time-tint.day {
      background: transparent;
      opacity: 0;
    }

    .time-tint.evening {
      background: linear-gradient(145deg, rgba(255, 178, 94, .28), rgba(194, 102, 63, .16));
      opacity: .52;
    }

    .time-tint.night {
      background: linear-gradient(145deg, rgba(30, 58, 102, .5), rgba(18, 42, 76, .34));
      opacity: .72;
      mix-blend-mode: multiply;
    }

    .furniture {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 10px 12px rgba(58, 38, 19, .18));
      user-select: none;
    }

    .poop-mark {
      position: absolute;
      left: var(--poop-x);
      top: var(--poop-y);
      width: var(--poop-size, 34px);
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 5px 6px rgba(58, 38, 19, .18));
      opacity: 1;
      object-fit: contain;
    }

    .furniture.perch {
      --x: 52%;
      --y: 58%;
      --w: 31%;
    }

    .furniture.bed {
      --x: 63%;
      --y: 24%;
      --w: 26%;
    }

    .furniture.toy {
      --x: 45%;
      --y: 27%;
      --w: 18%;
      transform-origin: 50% 88%;
    }

    .furniture.toy.wobble {
      animation: toyWobble 1.35s ease-in-out;
    }

    .furniture.food {
      --x: 25%;
      --y: 70%;
      --w: 32%;
    }

    .furniture.swing {
      --x: 70%;
      --y: 53%;
      --w: 24%;
    }

    .lantern-glow {
      position: absolute;
      --glow-x: 76%;
      --glow-y: 51%;
      --glow-size: 150px;
      width: var(--glow-size, 120px);
      height: var(--glow-size, 120px);
      left: var(--glow-x, 50%);
      top: var(--glow-y, 50%);
      transform: translate(-50%, -50%) scale(.96);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 126, .58) 0%, rgba(255, 192, 96, .22) 42%, rgba(255, 192, 96, 0) 72%);
      opacity: .58;
      mix-blend-mode: screen;
      pointer-events: none;
      animation: lanternGlow 4.5s ease-in-out infinite;
    }

    .lantern-glow.is-off {
      display: none;
    }

    @keyframes lanternGlow {
      0%, 100% {
        opacity: .42;
        transform: translate(-50%, -50%) scale(.92);
      }
      50% {
        opacity: .78;
        transform: translate(-50%, -50%) scale(1.07);
      }
    }

    .shop-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to bottom, rgba(255, 245, 220, .42), rgba(250, 231, 195, .3)),
        url("assets/inko-dollhouse-bg.png");
      background-size: cover;
      background-position: center 38%;
      filter: blur(6px) saturate(.94);
      transform: scale(1.05);
      opacity: .72;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(252, 245, 222, .38), transparent 18%, transparent 74%, rgba(70, 45, 24, .26)),
        radial-gradient(circle at 50% 42%, transparent 55%, rgba(61, 42, 24, .15));
    }

    .top-bar,
    .left-rail,
    .mood-button,
    .mood-panel,
    .care-row,
    .nav-bar,
    .bird-bubble,
    .toast,
    .sparkles,
    .shop-top,
    .shop-tabs,
    .shop-sheet,
    .placeholder-card {
      position: absolute;
      z-index: 10;
    }

    .top-bar {
      top: max(12px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      pointer-events: none;
    }

    .weather,
    .profile,
    .home-nut-box,
    .round-tool,
    .mood-button,
    .mood-panel,
    .care,
    .nav-bar,
    .back-button,
    .nut-wallet,
    .wood-sign,
    .shop-tabs,
    .product-card,
    .set-card,
    .placeholder-card {
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .home-nut-box {
      pointer-events: auto;
      justify-self: end;
      min-width: 74px;
      min-height: 46px;
      border-radius: 17px;
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 7px;
      align-items: center;
      padding: 7px 9px;
      background: rgba(255, 250, 236, .7);
      font-size: 14px;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .home-nut-box .acorn {
      transform: rotate(-18deg) scale(.82);
    }

    .discovery-sheet {
      position: absolute;
      z-index: 10;
      left: 14px;
      right: 14px;
      top: max(18px, env(safe-area-inset-top));
      bottom: 66px;
      overflow: auto;
      border-radius: 24px;
      padding: 20px 16px;
      background: rgba(255, 249, 232, .94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      scrollbar-width: thin;
    }

    .discovery-head {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .discovery-head h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.1;
    }

    .discovery-count {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 1000;
    }

    .discovery-section-title {
      margin: 20px 0 10px;
      font-size: 16px;
      font-weight: 1000;
    }

    .discovery-list {
      display: grid;
      gap: 9px;
    }

    .discovery-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.58);
      box-shadow: 0 5px 12px rgba(73,52,29,.07);
    }

    .discovery-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .discovery-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .word-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .word-chip {
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255, 222, 145, .5);
      font-size: 13px;
      font-weight: 1000;
    }

    .empty-discovery {
      padding: 22px 12px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.7;
    }

    .reward-layer {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .reward-layer.show { opacity: 1; }

    .reward-bag {
      position: absolute;
      left: var(--reward-x, 50%);
      top: var(--reward-y, 35%);
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%) scale(.6);
      object-fit: contain;
      filter: drop-shadow(0 16px 18px rgba(67,42,18,.28));
    }

    .reward-layer.show .reward-bag { animation: rewardBag 2.1s ease forwards; }

    .reward-copy {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translateX(-50%);
      min-width: 210px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,251,239,.96);
      box-shadow: var(--shadow);
      text-align: center;
      font-size: 13px;
      font-weight: 1000;
    }

    .reward-nut {
      position: absolute;
      left: var(--reward-x, 50%);
      top: var(--reward-y, 35%);
      width: 21px;
      height: 21px;
      object-fit: contain;
      filter: drop-shadow(0 4px 5px rgba(67,42,18,.18));
      animation: rewardNut 1.25s ease-in forwards;
      animation-delay: var(--delay);
    }

    @keyframes rewardBag {
      0% { transform: translate(-50%, -50%) scale(.5); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.08) rotate(-3deg); opacity: 1; }
      38% { transform: translate(-50%, -50%) scale(1) rotate(3deg); }
      55%, 85% { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
      100% { transform: translate(-50%, -60%) scale(.88); opacity: 0; }
    }

    @keyframes rewardNut {
      0% { transform: translate(-50%, 0) rotate(0deg) scale(.5); opacity: 0; }
      20% { opacity: 1; }
      55% { transform: translate(calc(-50% + var(--spread)), -48px) rotate(220deg) scale(1); }
      100% { left: 91%; top: 5%; transform: translate(-50%, -50%) rotate(520deg) scale(.4); opacity: 0; }
    }

    .lantern-switch {
      position: absolute;
      z-index: 8;
      left: 76%;
      top: 51%;
      width: 54px;
      height: 70px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255, 221, 145, .08);
      cursor: pointer;
    }

    .lantern-switch::after {
      content: "";
      position: absolute;
      inset: 15px 12px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(255, 224, 157, .22);
      transition: box-shadow 1s ease, background 1s ease;
    }

    .lantern-switch.is-lit::after {
      background: rgba(255, 218, 126, .35);
      box-shadow: 0 0 20px 8px rgba(255, 194, 86, .35);
    }

    .weather,
    .profile {
      pointer-events: auto;
    }

    .weather {
      min-width: 104px;
      min-height: 50px;
      border-radius: 17px;
      display: grid;
      grid-template-columns: 31px 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      font-weight: 900;
      background: rgba(255, 250, 236, .68);
    }

    .sun {
      width: 29px;
      height: 29px;
      border-radius: 50%;
      background: #ffbe2e;
      box-shadow: 0 0 0 5px rgba(255, 190, 46, .18);
    }

    .time {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .profile {
      justify-self: center;
      min-width: 160px;
      min-height: 56px;
      border-radius: 18px;
      display: grid;
      grid-template-columns: 39px 1fr;
      gap: 9px;
      align-items: center;
      padding: 8px 11px;
      background: rgba(255, 250, 236, .74);
    }

    .avatar {
      width: 39px;
      height: 39px;
      border-radius: 14px;
      background: linear-gradient(160deg, #ffea78 0 42%, #79c466 43%);
      box-shadow: inset 0 -5px 8px rgba(63, 65, 26, .12);
      position: relative;
      overflow: hidden;
    }

    .avatar::before,
    .avatar::after {
      content: "";
      position: absolute;
      top: 15px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2d2922;
    }

    .avatar::before { left: 12px; }
    .avatar::after { right: 12px; }

    .name {
      margin: 0;
      font-size: 19px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 1000;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .left-rail {
      left: 15px;
      top: 88px;
      display: grid;
      gap: 11px;
    }

    .round-tool {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 22px;
      background: rgba(255, 250, 236, .66);
      position: relative;
    }

    .round-tool small {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(255,255,255,.95);
    }

    .notice {
      position: absolute;
      right: 4px;
      top: 3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff725d;
      box-shadow: 0 0 0 3px rgba(255,255,255,.8);
    }

    .mood-button {
      top: max(74px, calc(env(safe-area-inset-top) + 74px));
      right: 14px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: rgba(255, 250, 236, .68);
    }

    .mood-button::after {
      content: "";
      position: absolute;
      right: 7px;
      bottom: 8px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(255,255,255,.74);
    }

    .mood-panel {
      top: max(130px, calc(env(safe-area-inset-top) + 130px));
      right: 14px;
      width: 150px;
      border-radius: 20px;
      padding: 12px;
      background: var(--paper-strong);
      opacity: 0;
      transform: translateY(-8px) scale(.96);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .mood-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .status-item {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 7px;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px dashed rgba(108, 79, 45, .18);
    }

    .status-item:last-child {
      border-bottom: 0;
      padding-bottom: 2px;
    }

    .status-label {
      margin-bottom: 5px;
      font-size: 11px;
      font-weight: 1000;
    }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(89, 65, 43, .12);
      box-shadow: inset 0 0 0 1px rgba(89, 65, 43, .08);
    }

    .dots span.on.good { background: var(--green); }
    .dots span.on.food { background: var(--amber); }
    .dots span.on.sleep { background: var(--violet); }
    .dots span.on.clean { background: var(--blue); }

    .live-bird {
      position: absolute;
      z-index: 3;
      left: var(--bird-x, 50%);
      top: var(--bird-y, 54%);
      width: var(--bird-w, 104px);
      height: var(--bird-h, var(--bird-w, 104px));
      transform: translate(-50%, -50%) scale(var(--bird-scale, 1));
      filter: drop-shadow(0 10px 9px rgba(47, 35, 20, .25));
      transition:
        left 1.7s cubic-bezier(.22, .9, .26, 1),
        top 1.7s cubic-bezier(.22, .9, .26, 1),
        transform 1.7s cubic-bezier(.22, .9, .26, 1);
      pointer-events: auto;
      cursor: pointer;
    }

    .live-bird img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: translateY(var(--mode-y-offset, 0px));
      transform-origin: bottom center;
      transition: opacity .18s ease, transform .2s ease;
      user-select: none;
    }

    .live-bird.is-breathing img {
      animation: birdBreathing 3s ease-in-out infinite;
    }

    .live-bird.moving { animation: floatMove 1.6s ease; }

    @keyframes floatMove {
      0%, 100% { margin-top: 0; }
      45% { margin-top: -22px; }
    }

    @keyframes birdBreathing {
      0%, 100% {
        transform: translateY(var(--mode-y-offset, 0px)) scaleX(.98) scaleY(.98);
      }
      50% {
        transform: translateY(var(--mode-y-offset, 0px)) scaleX(1.02) scaleY(1.03);
      }
    }

    @keyframes toyWobble {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      14% { transform: translate(-50%, -50%) rotate(-9deg); }
      30% { transform: translate(-50%, -50%) rotate(7deg); }
      46% { transform: translate(-50%, -50%) rotate(-5deg); }
      64% { transform: translate(-50%, -50%) rotate(3deg); }
      82% { transform: translate(-50%, -50%) rotate(-1.5deg); }
    }

    .bird-bubble {
      left: var(--bubble-x, 55%);
      top: var(--bubble-y, 47%);
      min-width: 44px;
      max-width: 112px;
      min-height: 36px;
      padding: 8px 11px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 253, 245, .94);
      box-shadow: 0 8px 22px rgba(72, 47, 25, .16);
      color: var(--ink);
      font-size: 14px;
      font-weight: 1000;
      opacity: 0;
      transform: translate(-50%, 10px) scale(.94);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease, left 1.5s ease, top 1.5s ease;
      text-align: center;
      white-space: nowrap;
    }

    .bird-bubble.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .bird-bubble::after {
      content: "";
      position: absolute;
      left: 21px;
      bottom: -6px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: inherit;
    }

    .care-row {
      left: 16px;
      right: 16px;
      bottom: 74px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .care {
      min-width: 0;
      min-height: 66px;
      border-radius: 22px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 4px;
      padding: 7px 4px 6px;
      background: rgba(255, 250, 236, .82);
      font-weight: 1000;
      transition: transform .16s ease, background .16s ease;
    }

    .care:active,
    .nav-item:active,
    .round-tool:active,
    .mood-button:active,
    .back-button:active,
    .buy-button:active,
    .heart-button:active {
      transform: translateY(2px) scale(.98);
    }

    .care-icon {
      width: 31px;
      height: 29px;
      display: grid;
      place-items: center;
      font-size: 23px;
      line-height: 1;
    }

    .care-label {
      font-size: 12px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .shop-top {
      top: max(16px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      height: 126px;
      display: grid;
      grid-template-columns: 50px 1fr 110px;
      gap: 10px;
      align-items: start;
    }

    .back-button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 250, 236, .84);
      font-size: 30px;
      line-height: 1;
    }

    .wood-sign {
      position: relative;
      min-height: 92px;
      border-radius: 23px;
      display: grid;
      place-items: center;
      padding: 13px 12px 12px;
      background:
        linear-gradient(90deg, rgba(112, 72, 28, .08), transparent 22%, rgba(112, 72, 28, .06)),
        linear-gradient(#fff3d8, #f6dfb4);
      box-shadow: 0 15px 32px rgba(91, 63, 34, .17);
    }

    .wood-sign::before,
    .wood-sign::after {
      content: "";
      position: absolute;
      top: -24px;
      width: 2px;
      height: 34px;

    function localDateKey(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function addUniqueDate(list, key) {
      if (!list.includes(key)) list.push(key);
      return list.slice(-40);
    }

    function countConsecutiveDates(list) {
      const unique = [...new Set(list)].sort().reverse();
      if (!unique.length) return 0;
      let count = 1;
      let cursor = new Date(`${unique[0]}T12:00:00`);
      for (let i = 1; i < unique.length; i += 1) {
        const expected = new Date(cursor);
        expected.setDate(expected.getDate() - 1);
        if (localDateKey(expected) !== unique[i]) break;
        count += 1;
        cursor = expected;
      }
      return count;
    }

    function recordSession() {
      const now = new Date();
      const today = localDateKey(now);
      state.loginDates = addUniqueDate(state.loginDates, today);
      if (now.getHours() >= 5 && now.getHours() < 10) state.morningDates = addUniqueDate(state.morningDates, today);
      if (now.getHours() >= 19 || now.getHours() < 2) state.nightDates = addUniqueDate(state.nightDates, today);
      const previous = Number(persistedState.lastSeenAt || 0);
      if (previous && Date.now() - previous >= 24 * 60 * 60 * 1000) state.missionStats.away24h = true;
      saveState();
    }

    function buildFurniturePlace(name) {
      const furniture = state.furnitureState[name];
      const offset = landingOffsets[name];
      const meta = placeMeta[name];
      const x = furniture.x + offset.x;
      const y = furniture.y + offset.y;
      return {
        x,
        y,
        scale: meta.scale,
        width: meta.width,
        height: meta.height || meta.width,
        bubbleX: x + meta.bubble.x,
        bubbleY: y + meta.bubble.y,
        zzzX: x + meta.zzz.x,
        zzzY: y + meta.zzz.y
      };
    }

    }

      Object.entries(state.furnitureState).forEach(([name, position]) => {
        const node = document.querySelector(`.furniture.${name}`);
        if (!node) return;
        node.style.setProperty("--x", `${position.x}%`);
        node.style.setProperty("--y", `${position.y}%`);
        node.style.setProperty("--w", `${furnitureSizes[name]}%`);
      });
      updatePlaces();
    }

    function renderDiscoveries() {
      const found = missionDefinitions.filter(mission => state.discoveredMissions.includes(mission.id));
      discoveryCount.textContent = `発見した行動 ${found.length} / ${TOTAL_DISCOVERIES}`;
      discoveryList.innerHTML = found.length ? found.map(mission => `
        <article class="discovery-card">
          <strong>✦ ${mission.title}</strong>
          <span>${mission.description}・木の実 ${mission.reward}個</span>
        </article>
      `).join("") : `<div class="empty-discovery">まだ何も見つかっていません。<br>もっちんと色々な時間を過ごしてみよう。</div>`;
      learnedWordsNode.innerHTML = state.learnedWords.length
        ? state.learnedWords.map(word => `<span class="word-chip">${word}</span>`).join("")
        : `<div class="empty-discovery">まだ言葉を覚えていません。</div>`;
      missionNotice.style.display = found.length ? "block" : "none";
    }

    function learnWord(word) {
      if (!word || state.learnedWords.includes(word)) return;
      state.learnedWords.push(word);
    }

    function checkMissions() {
      missionDefinitions.forEach(mission => {
        if (state.discoveredMissions.includes(mission.id) || !mission.check()) return;
        state.discoveredMissions.push(mission.id);
        learnWord(mission.word);
        rewardQueue.push(mission);
      });
      renderDiscoveries();
      saveState();
      playNextReward();
    }

    function playPopSound(delay = 0) {
      window.setTimeout(() => {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;
          const audio = new AudioContextClass();
          const oscillator = audio.createOscillator();
          const gain = audio.createGain();
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(520, audio.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(760, audio.currentTime + .08);
          gain.gain.setValueAtTime(.08, audio.currentTime);
          gain.gain.exponentialRampToValueAtTime(.001, audio.currentTime + .12);
          oscillator.connect(gain).connect(audio.destination);
          oscillator.start();
          oscillator.stop(audio.currentTime + .13);
        } catch {}
      }, delay);
    }

    function playNextReward() {
      if (rewardPlaying || !rewardQueue.length) return;
      rewardPlaying = true;
      const mission = rewardQueue.shift();
      const place = places[state.place] || places.perch;
      rewardLayer.style.setProperty("--reward-x", `${place.x}%`);
      rewardLayer.style.setProperty("--reward-y", `${Math.max(12, place.y - 13)}%`);
      rewardCopy.textContent = `「${mission.title}」発見！ 木の実 +${mission.reward}`;
      rewardNuts.innerHTML = Array.from({ length: 5 }, (_, index) => `
        <img class="reward-nut" src="assets/home/seed.png" alt="" style="--delay:${.35 + index * .13}s; --spread:${(index - 2) * 14}px" />
      `).join("");
      rewardLayer.classList.remove("show");
      void rewardLayer.offsetWidth;
      rewardLayer.classList.add("show");
      playPopSound(650);
      playPopSound(880);
      window.setTimeout(() => {
        state.nuts += mission.reward;
        renderNuts();
        if (mission.word) showBubble(mission.word, 1800);
      }, 1250);
      window.setTimeout(() => {
        rewardLayer.classList.remove("show");
        rewardNuts.innerHTML = "";
        rewardPlaying = false;
        playNextReward();
      }, 2300);
    }

    function showScreen(name) {
      const isDiscovery = name === "discovery" || name === "book";
      if (name === "shop") state.missionStats.shopVisits += 1;
      if (isDiscovery) state.missionStats.discoveryViews += 1;
      screens.home.classList.toggle("active", name === "home");
      screens.shop.classList.toggle("active", name === "shop");
      screens.discovery.classList.toggle("active", isDiscovery);
      screens.placeholder.classList.toggle("active", !["home", "shop", "book", "discovery"].includes(name));
      document.querySelectorAll(".nav-item").forEach(item => {
        item.classList.toggle("active", item.dataset.screen === name || (isDiscovery && item.dataset.screen === "book"));
      });
      if (!["home", "shop", "book", "discovery"].includes(name)) {
        const labels = { interior: "インテリア", letter: "通信" };
        placeholderTitle.textContent = labels[name] || "仮画面";
      }
      if (isDiscovery) {
        renderDiscoveries();
        missionNotice.style.display = "none";
      }
      moodPanel.classList.remove("open");
      moodButton.setAttribute("aria-expanded", "false");
      checkMissions();
      if (isDiscovery) missionNotice.style.display = "none";
    }

    function setDots(id, value, className) {
      const node = document.querySelector(id);
      node.innerHTML = "";
      for (let i = 0; i < 5; i += 1) {
        const dot = document.createElement("span");
        if (i < value) dot.className = `on ${className}`;
        node.appendChild(dot);
      }
    }

    function renderMood() {
      setDots("#moodDots", state.mood, "good");
      setDots("#hungerDots", state.hunger, "food");
      setDots("#sleepDots", state.sleep, "sleep");
      setDots("#cleanDots", state.clean, "clean");
      saveState();
    }

    function setBirdMode(mode) {
      state.mode = mode;
      birdImage.src = birdImages[mode] || birdImages.normal;
      liveBird.style.setProperty("--mode-y-offset", `${birdModeYOffset[mode] || 0}px`);
      liveBird.classList.toggle("is-breathing", mode === "normal" || mode === "sleeping");
      if (mode === "attack") {
        liveBird.style.setProperty("--bird-w", "132px");
        liveBird.style.setProperty("--bird-h", "66px");
      } else if (mode === "drinking") {
        liveBird.style.setProperty("--bird-w", "116px");
        liveBird.style.setProperty("--bird-h", "78px");
      } else if (mode === "walk" || mode === "walk2") {
        liveBird.style.setProperty("--bird-w", "94px");
        liveBird.style.setProperty("--bird-h", "76px");
      } else {
        const place = places[state.place] || places.perch;
        liveBird.style.setProperty("--bird-w", `${place.width}px`);
        liveBird.style.setProperty("--bird-h", `${place.height || place.width}px`);
      }
      zzzEffect.classList.toggle("show", mode === "sleeping");
    }

    function clearBehaviorTimers() {
      behaviorTimers.forEach(timer => window.clearTimeout(timer));
      behaviorTimers = [];
      window.clearInterval(walkFrameTimer);
      walkFrameTimer = 0;
    }

    function later(delay, task) {
      const timer = window.setTimeout(task, delay);
      behaviorTimers.push(timer);
      return timer;
    }

    function setBirdAt(placeName) {
      const place = places[placeName];
      const previousPlace = state.place;
      state.place = placeName;
      if (placeName === "swing" && previousPlace !== "swing") {
        state.missionStats.swingVisits += 1;
        checkMissions();
      }
      liveBird.style.setProperty("--bird-x", `${place.x}%`);
      liveBird.style.setProperty("--bird-y", `${place.y}%`);
      liveBird.style.setProperty("--bird-scale", place.scale);
      liveBird.style.setProperty("--bird-w", `${place.width}px`);
      liveBird.style.setProperty("--bird-h", `${place.height || place.width}px`);
      birdBubble.style.setProperty("--bubble-x", `${place.bubbleX}%`);
      birdBubble.style.setProperty("--bubble-y", `${place.bubbleY}%`);
      zzzEffect.style.setProperty("--zzz-x", `${place.zzzX}%`);
      zzzEffect.style.setProperty("--zzz-y", `${place.zzzY}%`);
    }

    function moveBird(placeName, arrivalMode = "normal", travel = "fly") {
      clearBehaviorTimers();
      const place = places[placeName];
      setBirdMode(travel === "walk" ? "walk" : "flying");
      if (travel === "walk") {
        let frame = false;
        walkFrameTimer = window.setInterval(() => {
          frame = !frame;
          setBirdMode(frame ? "walk2" : "walk");
        }, 260);
      }
      setBirdAt(placeName);
      zzzEffect.classList.remove("show");
      liveBird.classList.remove("moving");
      void liveBird.offsetWidth;
      liveBird.classList.add("moving");
      later(travel === "walk" ? 1700 : 1250, () => {
        window.clearInterval(walkFrameTimer);
        walkFrameTimer = 0;
        liveBird.classList.remove("moving");
        setBirdMode(arrivalMode);
      });
    }

    function showBubble(message, duration = 1700) {
      birdBubble.textContent = message;
      birdBubble.classList.add("show");
      window.clearTimeout(bubbleTimer);
      bubbleTimer = window.setTimeout(() => birdBubble.classList.remove("show"), duration);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 1200);
    }

    function addSparkles(count, around = places.perch) {
      for (let i = 0; i < count; i += 1) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.style.left = `${around.x - 9 + Math.random() * 18}%`;
        spark.style.top = `${around.y - 10 + Math.random() * 18}%`;
        spark.style.animationDelay = `${i * 55}ms`;
        sparkles.appendChild(spark);
        spark.addEventListener("animationend", () => spark.remove());
      }
    }

    function renderPoops() {
      state.poops = state.poops.slice(-MAX_POOPS);
      updateCleanFromPoops();
      poopLayer.innerHTML = state.poops.map(poop => `
        <img class="poop-mark" src="${birdImages.poop}" alt="" style="--poop-x:${poop.x}%; --poop-y:${poop.y}%; --poop-size:${poop.size || 24}px;" />
      `).join("");
      saveState();
    }

    function updateCleanFromPoops() {
      const count = state.poops.length;
      if (count <= 4) state.clean = 5;
      else if (count <= 9) state.clean = 4;
      else if (count <= 14) state.clean = 3;
      else if (count <= 19) state.clean = 2;
      else state.clean = 1;
    }

    function createPoop() {
      const place = places[state.place] || places.perch;
      const poopOffsets = {
        perch: { x: 0, y: 5 },
        bed: { x: -1, y: 5 },
        food: { x: 1, y: 5 },
        swing: { x: 0, y: 5 },
        toy: { x: -1, y: 4 },
        floorLeft: { x: 1, y: 4 },
        floorCenter: { x: 1, y: 4 },
        floorRight: { x: 1, y: 4 }
      };
      const offset = poopOffsets[state.place] || { x: 0, y: 5 };
      const x = clamp(place.x + offset.x + randomBetween(-2, 2), 10, 90);
      const y = clamp(place.y + offset.y + randomBetween(-1, 2), 12, 86);
      state.poops.push({ x, y, size: randomBetween(26, 36) });
      state.poops = state.poops.slice(-MAX_POOPS);
      renderPoops();
      renderMood();
    }

    function performPoop() {
      if (isPooping) return;
      isPooping = true;
      state.poopGauge = 0;
      setBirdMode(state.mode === "sleeping" ? "sleeping" : "normal");
      showBubble("・・・", 650);
      window.setTimeout(() => {
        createPoop();
        showBubble(poopLines[Math.floor(Math.random() * poopLines.length)], 1600);
        isPooping = false;
        saveState();
      }, 500);
    }

    function gainPoopGauge(amount) {
      if (isPooping) return;
      state.poopGauge = Math.min(POOP_THRESHOLD + 40, state.poopGauge + amount);
      if (state.poopGauge >= POOP_THRESHOLD) performPoop();
      else saveState();
    }

    function startPoopGaugeTimer() {
      window.clearInterval(poopTimer);
      poopTimer = window.setInterval(() => {
        if (screens.home.classList.contains("active")) gainPoopGauge(POOP_TIME_GAIN);
      }, POOP_TICK_MS);
    }

    function randomPlace() {
      const keys = Object.keys(places).filter(key => key !== state.place);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    function nextLifeAction() {
      if (state.hunger <= 1) return { type: "eat" };
      if (state.sleep <= 1) return { type: "sleep" };
      if (state.mood <= 1) return { type: "toy" };
      const actions = [
        { type: "perch", weight: 24 },
        { type: "preen", weight: 16 },
        { type: "floorWalk", weight: 22 },
        { type: "eat", weight: 12 },
        { type: "drink", weight: 10 },
        { type: "swing", weight: 10 },
        { type: "toy", weight: 8 },
        { type: "sleep", weight: 8 }
      ];
      const total = actions.reduce((sum, action) => sum + action.weight, 0);
      let cursor = Math.random() * total;
      for (const action of actions) {
        cursor -= action.weight;
        if (cursor <= 0) return action;
      }
      return { type: "perch" };
    }

    function wobbleToy() {
      toyFigure.classList.remove("wobble");
      void toyFigure.offsetWidth;
      toyFigure.classList.add("wobble");
    }

    function animateEating() {
      const frames = ["eat", "normal", "eat", "normal", "eat", "normal"];
      frames.forEach((frame, index) => later(index * 430, () => setBirdMode(frame)));
      gainPoopGauge(POOP_FOOD_GAIN);
    }

    function animatePreening() {
      setBirdMode("preening");
      showBubble("きれいきれい", 1600);
      later(3600, () => setBirdMode("normal"));
    }

    function animateTilt() {
      setBirdMode("tilt");
      if (Math.random() < .45) showBubble("ぴ？", 1100);
      later(1700, () => setBirdMode("normal"));
    }

    function animateStretch() {
      setBirdMode("stretch");
      later(2200, () => setBirdMode("normal"));
    }

    function animateDrinking() {
      const frames = ["drinking", "normal", "drinking", "normal"];
      frames.forEach((frame, index) => later(index * 520, () => setBirdMode(frame)));
      showBubble("ごくごく", 1300);
    }

    function animateSleep() {
      setBirdMode("yawn");
      showBubble("ねむい", 1400);
      later(1500, () => setBirdMode("sleeping"));
    }

    function animateToyPeck() {
      setBirdMode("attack");
      gainPoopGauge(POOP_TOY_GAIN);
      showBubble("♪", 1500);
      later(250, wobbleToy);
      later(1700, () => setBirdMode("normal"));
    }

    function smallHop() {
      liveBird.classList.remove("is-breathing");
      liveBird.classList.remove("moving");
      void liveBird.offsetWidth;
      liveBird.classList.add("moving");
      later(1600, () => {
        liveBird.classList.remove("moving");
        if (state.mode === "normal") liveBird.classList.add("is-breathing");
      });
    }

    function tinyWalkInPlace() {
      if (!places[state.place]?.isFloor) {
        smallHop();
        return;
      }
      gainPoopGauge(POOP_WALK_GAIN);
      let frame = false;
      setBirdMode("walk");
      const stepTimer = window.setInterval(() => {
        frame = !frame;
        setBirdMode(frame ? "walk2" : "walk");
      }, 260);
      later(1100, () => {
        window.clearInterval(stepTimer);
        setBirdMode("normal");
      });
    }

    function runSmallAction() {
      if (["flying", "walk", "walk2", "attack", "preening", "eat", "yawn", "tilt", "drinking", "stretch"].includes(state.mode)) return;
      if (state.mode === "sleeping") {
        if (Math.random() < .45) showBubble("すやすや", 1200);
        return;
      }

      const place = state.place;
      const actions = ["bubble", "hop", "tilt", "tilt"];
      const isFloor = Boolean(places[place]?.isFloor);
      if (place === "perch" || place === "swing" || isFloor) actions.push("preen", "stretch");
      if (place === "food") actions.push("eat", "drink", "drink");
      if (place === "bed") actions.push("yawn");
      if (place === "toy") actions.push("peck");
      if (isFloor) actions.push("tinyWalk", "tinyWalk", "stretch");
      if (state.clean <= 2 || state.poops.length >= 10) actions.push("dirty", "dirty");

      const action = actions[Math.floor(Math.random() * actions.length)];
      if (action === "preen") {
        animatePreening();
        return;
      }
      if (action === "tilt") {
        animateTilt();
        return;
      }
      if (action === "stretch") {
        animateStretch();
        return;
      }
      if (action === "drink") {
        animateDrinking();
        return;
      }
      if (action === "eat") {
        animateEating();
        showBubble("もぐもぐ", 1200);
        state.hunger = clamp(state.hunger + 1);
        renderMood();
        return;
      }
      if (action === "yawn") {
        setBirdMode("yawn");
        showBubble("ふぁ…", 1200);
        later(1200, () => setBirdMode(place === "bed" ? "sleeping" : "normal"));
        return;
      }
      if (action === "peck") {
        animateToyPeck();
        return;
      }
      if (action === "tinyWalk") {
        tinyWalkInPlace();
        return;
      }
      if (action === "hop") {
        smallHop();
        return;
      }
      if (action === "dirty") {
        showBubble(dirtyLines[Math.floor(Math.random() * dirtyLines.length)], 1500);
        return;
      }
      showBubble(randomSpeech(), 1200);
    }

    function scheduleSmallAction() {
      window.clearTimeout(smallActionTimer);
      smallActionTimer = window.setTimeout(smallLife, randomBetween(SMALL_ACTION_MIN_MS, SMALL_ACTION_MAX_MS));
    }

    function scheduleMoveAction() {
      window.clearTimeout(moveActionTimer);
      moveActionTimer = window.setTimeout(moveLife, randomBetween(MOVE_ACTION_MIN_MS, MOVE_ACTION_MAX_MS));
    }

    function startHomeStayTimer() {
      window.clearInterval(homeStayTimer);
      homeStayTimer = window.setInterval(() => {
        if (!screens.home.classList.contains("active")) return;
        state.missionStats.homeSeconds += 1;
        if ([60, 180].includes(state.missionStats.homeSeconds)) checkMissions();
        else if (state.missionStats.homeSeconds % 15 === 0) saveState();
      }, 1000);
    }

    function smallLife() {
      if (screens.home.classList.contains("active")) runSmallAction();
      scheduleSmallAction();
    }

    function moveLife() {
      if (screens.home.classList.contains("active")) {
        const action = nextLifeAction();
        runLifeAction(action.type);
        state.hunger = clamp(state.hunger - (Math.random() < .55 ? 1 : 0));
        state.sleep = clamp(state.sleep - (Math.random() < .42 ? 1 : 0));
        state.mood = clamp(state.mood - (Math.random() < .3 ? 1 : 0));
        renderMood();
      }
      scheduleMoveAction();
    }

    function runLifeAction(type) {
      if (type === "eat") {
        moveBird("food");
        state.hunger = clamp(state.hunger + 2);
        showBubble("もぐもぐ", 1800);
        later(1300, animateEating);
        return;
      }
      if (type === "drink") {
        moveBird("food", "normal");
        later(1300, animateDrinking);
        return;
      }
      if (type === "sleep") {
        moveBird("bed", "yawn");
        state.sleep = clamp(state.sleep + 2);
        later(1300, animateSleep);
        return;
      }
      if (type === "toy") {
        moveBird("toy", "attack");
        state.mood = clamp(state.mood + 2);
        later(1300, animateToyPeck);
        return;
      }
      if (type === "preen") {
        const floorKeys = ["floorLeft", "floorCenter", "floorRight"];
        const place = floorKeys.includes(state.place) ? state.place : Math.random() < .6 ? "perch" : "swing";
        moveBird(place, "normal");
        state.mood = clamp(state.mood + 1);
        later(1400, animatePreening);
        return;
      }
      if (type === "floorWalk") {
        const floorKeys = ["floorLeft", "floorCenter", "floorRight"];
        const destination = floorKeys[Math.floor(Math.random() * floorKeys.length)];
        if (!floorKeys.includes(state.place)) {
          moveBird(destination, "walk");
          later(1800, () => {
            const nextFloor = floorKeys.filter(key => key !== destination)[Math.floor(Math.random() * 2)];
            moveBird(nextFloor, "walk", "walk");
            gainPoopGauge(POOP_WALK_GAIN);
          });
          return;
        }
        const nextFloor = floorKeys.filter(key => key !== state.place)[Math.floor(Math.random() * 2)];
        moveBird(nextFloor, "walk", "walk");
        gainPoopGauge(POOP_WALK_GAIN);
        showBubble(randomSpeech(), 1300);
        return;
      }
      if (type === "swing") {
        moveBird("swing", "normal");
        state.mood = clamp(state.mood + 1);
        if (Math.random() < .55) later(1600, animatePreening);
        return;
      }
      moveBird("perch", "normal");
      if (Math.random() < .35) later(1800, animatePreening);
    }

    function renderProducts() {
      const category = categories[state.category];
      categoryTitle.textContent = category.title;
      categoryCopy.textContent = category.copy;
      productGrid.innerHTML = category.items.map((item, index) => `
        <article class="product-card">
          <button class="heart-button" aria-label="${item.name}をお気に入りにする" data-heart>♡</button>
          <h3 class="product-title">${item.name}</h3>
          <div class="product-art ${item.art}"><span>${item.icon}</span></div>
          <p class="product-desc">${item.desc}</p>
          <div class="price"><span class="acorn" aria-hidden="true"></span><span>${item.price}</span></div>
          <button class="buy-button" data-price="${item.price}" data-name="${item.name}">購入する</button>
        </article>
      `).join("");
    }

    function renderSets() {
      setsRow.innerHTML = sets.map(set => `
        <article class="set-card">
          <div class="set-preview"></div>
          <div>
            <h3>${set.name}</h3>
            <div class="set-icons">${set.icons.map(icon => `<span>${icon}</span>`).join("")}</div>
            <div class="set-price"><span class="acorn" aria-hidden="true"></span><strong>${set.price}</strong><span class="badge">10% OFF</span></div>
          </div>
        </article>
      `).join("");
    }

    function renderNuts() {
      nutCount.textContent = state.nuts.toLocaleString("ja-JP");
      homeNutCount.textContent = state.nuts.toLocaleString("ja-JP");
      saveState();
    }

    document.querySelectorAll("[data-action]").forEach(button => {
      button.addEventListener("click", () => {
        const action = button.dataset.action;
        state.missionStats.tapCount += 1;
        if (action === "feed") {
          state.missionStats.feedCount += 1;
          state.hunger = clamp(state.hunger + 2);
          moveBird("food");
          showBubble("おいしい");
          later(1300, animateEating);
          showToast("ごはんをあげました");
        }
        if (action === "pet") {
          state.missionStats.petCount += 1;
          state.mood = clamp(state.mood + 1);
          showBubble("♡");
          if (["perch", "swing"].includes(state.place)) animatePreening();
          showToast("もっちんがうれしそう");
        }
        if (action === "toy") {
          state.missionStats.toyCount += 1;
          state.mood = clamp(state.mood + 2);
          state.sleep = clamp(state.sleep - 1);
          moveBird("toy", "attack");
          later(1300, animateToyPeck);
          showBubble("♪");
          showToast("おもちゃをつつきました");
        }
        if (action === "clean") {
          state.missionStats.cleanPressCount += 1;
          state.missionStats.cleanedPoops += state.poops.length;
          state.clean = 5;
          state.poops = [];
          state.poopGauge = 0;
          renderPoops();
          showBubble(cleanLines[Math.floor(Math.random() * cleanLines.length)], 1700);
          addSparkles(12, places[state.place]);
        }
        renderMood();
        checkMissions();
      });
    });

    document.querySelectorAll("[data-message]").forEach(button => {
      button.addEventListener("click", () => {
        showToast(button.dataset.message);
        addSparkles(5, places[state.place]);
      });
    });

    document.querySelector("#missionButton").addEventListener("click", () => showScreen("discovery"));
    document.querySelector("#discoveryBack").addEventListener("click", () => showScreen("home"));

    function tapMocchin() {
      state.missionStats.birdTapCount += 1;
      if (state.mode === "normal") animateTilt();
      else showBubble("ぴ", 900);
      checkMissions();
    }

    liveBird.addEventListener("click", tapMocchin);
    liveBird.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        tapMocchin();
      }
    });

    document.querySelectorAll(".nav-item").forEach(button => {
      button.addEventListener("click", () => showScreen(button.dataset.screen));
    });

    document.querySelector("#shopBack").addEventListener("click", () => showScreen("home"));

    document.querySelectorAll(".category-tab").forEach(button => {
      button.addEventListener("click", () => {
        state.category = button.dataset.category;
        document.querySelectorAll(".category-tab").forEach(tab => tab.classList.remove("active"));
        button.classList.add("active");
        renderProducts();
      });
    });

    productGrid.addEventListener("click", event => {
      const heart = event.target.closest("[data-heart]");
      if (heart) {
        heart.classList.toggle("active");
        heart.textContent = heart.classList.contains("active") ? "♥" : "♡";
        return;
      }

      const buy = event.target.closest(".buy-button");
      if (!buy) return;
      const price = Number(buy.dataset.price);
      if (state.nuts < price) {
        showToast("木の実が足りません");
        return;
      }
      state.nuts -= price;
      state.purchasedItems.push(buy.dataset.name);
      renderNuts();
      showToast("購入しました");
      checkMissions();
    });

    moodButton.addEventListener("click", () => {
      const isOpen = moodPanel.classList.toggle("open");
      moodButton.setAttribute("aria-expanded", String(isOpen));
    });

    lanternSwitch.addEventListener("click", () => {
      const switchingToNight = !timeTint.classList.contains("night");
      state.manualTimeMode = switchingToNight ? "night" : "day";
      updateTimeOfDay();
      if (switchingToNight && Math.random() < .75) {
        const nightLines = ["おやすみ", "ねる？", "すやすや"];
        showBubble(nightLines[Math.floor(Math.random() * nightLines.length)], 1600);
      }
      saveState();
    });

    document.addEventListener("click", event => {
      if (!moodPanel.contains(event.target) && !moodButton.contains(event.target)) {
        moodPanel.classList.remove("open");
        moodButton.setAttribute("aria-expanded", "false");
      }
    });

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
      updateTimeOfDay(now);
    }

    function updateTimeOfDay(now = new Date()) {
      const hour = now.getHours();
      let period = "night";
      if (hour >= 5 && hour < 10) period = "morning";
      else if (hour >= 10 && hour < 16) period = "day";
      else if (hour >= 16 && hour < 19) period = "evening";
      if (state.manualTimeMode === "night" || state.manualTimeMode === "day") period = state.manualTimeMode;
      timeTint.className = `time-tint ${period}`;
      lanternGlow.classList.toggle("is-off", period !== "night");
      lanternSwitch.classList.toggle("is-lit", period === "night");
    }

    applyFurniturePositions();
    recordSession();
    renderPoops();
    renderMood();
    renderProducts();
    renderSets();
    renderNuts();
    renderDiscoveries();
    setBirdAt("perch");
    setBirdMode("normal");
    showBubble("♪", 1400);
    updateClock();
    window.setInterval(updateClock, 30000);
    startPoopGaugeTimer();
    startHomeStayTimer();
    scheduleSmallAction();
    scheduleMoveAction();
    checkMissions();
  </script>
</body>
</html>
