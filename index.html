<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>もっちんの部屋</title>
  <style>
    :root {
      --ink: #5a422d;
      --muted: #806a52;
      --paper: rgba(255, 250, 236, .78);
      --paper-strong: rgba(255, 250, 236, .94);
      --shop-paper: rgba(255, 248, 231, .96);
      --line: rgba(101, 72, 43, .16);
      --green: #76bf68;
      --amber: #f2ad3b;
      --blue: #65b9d1;
      --violet: #9380cc;
      --shadow: 0 12px 30px rgba(73, 52, 29, .16);
      font-family: "Yu Gothic UI", "Hiragino Sans", "Meiryo", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(255, 235, 178, .74), transparent 31%),
        linear-gradient(135deg, #dbe9cf, #f9eedc 52%, #d5e7cf);
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid rgba(242, 173, 59, .45);
      outline-offset: 3px;
    }

    .phone {
      position: relative;
      width: min(100vw, 480px);
      aspect-ratio: 9 / 16;
      max-height: 100vh;
      min-height: 720px;
      overflow: hidden;
      background: #efe1ca;
      box-shadow: 0 28px 80px rgba(68, 52, 34, .3);
      isolation: isolate;
    }

    .phone.holding-tissue { touch-action: none; }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      overflow: hidden;
      background: #efe1ca;
    }

    .screen.active {
      display: block;
    }

    .room {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,0) 24%, rgba(43,27,12,.04) 66%, rgba(43,27,12,.32) 100%),
        url("assets/home/room.png");
      background-size: cover;
      background-position: center;
      transform: scale(1.006);
      z-index: 0;
    }

    .furniture-layer,
    .poop-layer,
    .bird-layer,
    .effect-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .furniture-layer { z-index: 2; }
    .bird-layer { z-index: 4; }
    .time-tint { z-index: 6; }
    .effect-layer { z-index: 7; }
    .poop-layer { z-index: 9; }

    .time-tint {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      transition: background 1.2s ease, opacity 1.2s ease;
    }

    .time-tint.morning {
      background: linear-gradient(145deg, rgba(255, 245, 188, .35), rgba(255, 255, 255, .08));
      opacity: .32;
    }

    .time-tint.day {
      background: transparent;
      opacity: 0;
    }

    .time-tint.evening {
      background: linear-gradient(145deg, rgba(255, 178, 94, .28), rgba(194, 102, 63, .16));
      opacity: .52;
    }

    .time-tint.night {
      background: linear-gradient(145deg, rgba(30, 58, 102, .5), rgba(18, 42, 76, .34));
      opacity: .72;
      mix-blend-mode: multiply;
    }

    .furniture {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 10px 12px rgba(58, 38, 19, .18));
      user-select: none;
    }

    .poop-mark {
      position: absolute;
      left: var(--poop-x);
      top: var(--poop-y);
      width: var(--poop-size, 34px);
      height: var(--poop-size, 34px);
      border: 0;
      padding: 0;
      background: transparent;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 5px 6px rgba(58, 38, 19, .18));
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    .poop-mark img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    .poop-mark:active { transform: translate(-50%, -50%) scale(.9); }

    .furniture.perch {
      --x: 52%;
      --y: 58%;
      --w: 31%;
    }

    .furniture.bed {
      --x: 63%;
      --y: 24%;
      --w: 26%;
    }

    .furniture.toy {
      --x: 45%;
      --y: 27%;
      --w: 18%;
      transform-origin: 50% 88%;
      pointer-events: auto;
      cursor: pointer;
    }

    .furniture.toy.wobble {
      animation: toyWobble 1.35s ease-in-out;
    }

    .furniture.toy2 {
      --x: 35%;
      --y: 63%;
      --w: 14%;
      transform-origin: 50% 76%;
      pointer-events: auto;
      cursor: pointer;
    }

    .furniture.toy2.rolling {
      animation: toy2Roll 2.2s cubic-bezier(.24, .72, .3, 1) both;
    }

    @keyframes toy2Roll {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      72%, 100% { transform: translate(calc(-50% + 72px), -50%) rotate(420deg); }
    }

    .furniture.food {
      --x: 25%;
      --y: 70%;
      --w: 32%;
    }

    .furniture.swing {
      --x: 70%;
      --y: 53%;
      --w: 24%;
    }

    .swing-seat-group {
      position: absolute;
      left: var(--x, 70%);
      top: var(--y, 53%);
      width: var(--w, 24%);
      aspect-ratio: 2 / 3;
      transform: translate(-50%, -50%);
      transform-origin: 64% 20.5%;
      z-index: 3;
      pointer-events: none;
    }

    .swing-seat-group.is-swinging {
      animation: swingRide 3.4s ease-in-out infinite;
    }

    .swing-seat-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 10px 12px rgba(58, 38, 19, .18));
      user-select: none;
    }

    .swing-seat-group .live-bird {
      left: 64%;
      top: 49%;
      width: 90px;
      height: 90px;
      transform: translate(-50%, -50%) scale(.6);
      transform-origin: center;
      transition: none;
    }

    @keyframes swingRide {
      0%, 100% { transform: translate(-50%, -50%) rotate(-5.5deg); }
      50% { transform: translate(-50%, -50%) rotate(5.5deg); }
    }

    .life-object-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    .life-object {
      position: absolute;
      border: 0;
      padding: 0;
      background: transparent;
      pointer-events: auto;
      cursor: pointer;
      filter: drop-shadow(0 8px 9px rgba(58, 38, 19, .2));
      transition: transform .18s ease, filter .18s ease;
    }

    .life-object:active { transform: translate(-50%, -50%) scale(.94); }
    .life-object img { width: 100%; display: block; pointer-events: none; }

    .tissue-box {
      left: 12%;
      top: 70%;
      width: 13%;
      transform: translate(-50%, -50%);
    }

    .trash-bin {
      left: 86%;
      top: 68%;
      width: 15%;
      transform: translate(-50%, -50%);
    }

    .door-hotspot {
      left: 88%;
      top: 46%;
      width: 17%;
      height: 27%;
      transform: translate(-50%, -50%);
      border-radius: 45% 45% 12px 12px;
      filter: none;
    }

    .door-hotspot::after {
      content: "外へ";
      position: absolute;
      right: 5px;
      top: 50%;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 250, 236, .78);
      color: rgba(82, 58, 37, .74);
      font-size: 10px;
      font-weight: 1000;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .door-hotspot:focus-visible::after,
    .door-hotspot:hover::after { opacity: 1; }

    .held-tissue {
      position: absolute;
      z-index: 31;
      left: var(--tissue-x, 76%);
      top: var(--tissue-y, 72%);
      width: 74px;
      opacity: 0;
      transform: translate(-50%, -50%) scale(.7) rotate(-8deg);
      transform-origin: center;
      filter: drop-shadow(0 10px 10px rgba(55, 38, 22, .24));
      pointer-events: none;
      transition: opacity .2s ease, transform .25s ease;
    }

    .held-tissue.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1) rotate(-8deg);
    }

    .held-tissue.used {
      transform: translate(-50%, -50%) scale(.9) rotate(9deg);
      filter: sepia(.18) drop-shadow(0 8px 8px rgba(55, 38, 22, .2));
    }

    .life-feedback {
      position: absolute;
      z-index: 32;
      left: var(--feedback-x, 50%);
      top: var(--feedback-y, 56%);
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 253, 245, .94);
      box-shadow: 0 8px 18px rgba(72, 47, 25, .16);
      color: var(--ink);
      font-size: 13px;
      font-weight: 1000;
      opacity: 0;
      transform: translate(-50%, 8px) scale(.92);
      pointer-events: none;
    }

    .life-feedback.show { animation: lifeFeedback 1.15s ease both; }

    @keyframes lifeFeedback {
      0% { opacity: 0; transform: translate(-50%, 8px) scale(.92); }
      20%, 72% { opacity: 1; transform: translate(-50%, 0) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -12px) scale(.96); }
    }

    .lantern-glow {
      position: absolute;
      --glow-x: 76%;
      --glow-y: 51%;
      --glow-size: 150px;
      width: var(--glow-size, 120px);
      height: var(--glow-size, 120px);
      left: var(--glow-x, 50%);
      top: var(--glow-y, 50%);
      transform: translate(-50%, -50%) scale(.96);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 220, 126, .58) 0%, rgba(255, 192, 96, .22) 42%, rgba(255, 192, 96, 0) 72%);
      opacity: .58;
      mix-blend-mode: screen;
      pointer-events: none;
      animation: lanternGlow 4.5s ease-in-out infinite;
    }

    .lantern-glow.is-off {
      display: none;
    }

    @keyframes lanternGlow {
      0%, 100% {
        opacity: .42;
        transform: translate(-50%, -50%) scale(.92);
      }
      50% {
        opacity: .78;
        transform: translate(-50%, -50%) scale(1.07);
      }
    }

    .shop-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to bottom, rgba(255, 245, 220, .42), rgba(250, 231, 195, .3)),
        url("assets/inko-dollhouse-bg.png");
      background-size: cover;
      background-position: center 38%;
      filter: blur(6px) saturate(.94);
      transform: scale(1.05);
      opacity: .72;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(252, 245, 222, .38), transparent 18%, transparent 74%, rgba(70, 45, 24, .26)),
        radial-gradient(circle at 50% 42%, transparent 55%, rgba(61, 42, 24, .15));
    }

    .top-bar,
    .left-rail,
    .mood-button,
    .mood-panel,
    .care-row,
    .nav-bar,
    .bird-bubble,
    .toast,
    .sparkles,
    .shop-top,
    .shop-tabs,
    .shop-sheet,
    .placeholder-card {
      position: absolute;
      z-index: 10;
    }

    .top-bar {
      top: max(12px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      pointer-events: none;
    }

    .weather,
    .profile,
    .home-nut-box,
    .round-tool,
    .mood-button,
    .mood-panel,
    .care,
    .nav-bar,
    .back-button,
    .nut-wallet,
    .wood-sign,
    .shop-tabs,
    .product-card,
    .set-card,
    .placeholder-card {
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .home-nut-box {
      pointer-events: auto;
      justify-self: end;
      min-width: 74px;
      min-height: 46px;
      border-radius: 17px;
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 7px;
      align-items: center;
      padding: 7px 9px;
      background: rgba(255, 250, 236, .7);
      font-size: 14px;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .home-nut-box .acorn {
      transform: rotate(-18deg) scale(.82);
    }

    .discovery-sheet {
      position: absolute;
      z-index: 10;
      left: 14px;
      right: 14px;
      top: max(18px, env(safe-area-inset-top));
      bottom: 66px;
      overflow: auto;
      border-radius: 24px;
      padding: 20px 16px;
      background: rgba(255, 249, 232, .94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      scrollbar-width: thin;
    }

    .discovery-head {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .discovery-head h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.1;
    }

    .discovery-count {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 1000;
    }

    .discovery-section-title {
      margin: 20px 0 10px;
      font-size: 16px;
      font-weight: 1000;
    }

    .discovery-list {
      display: grid;
      gap: 9px;
    }

    .discovery-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.58);
      box-shadow: 0 5px 12px rgba(73,52,29,.07);
    }

    .discovery-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .discovery-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .word-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .word-chip {
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255, 222, 145, .5);
      font-size: 13px;
      font-weight: 1000;
    }

    .empty-discovery {
      padding: 22px 12px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.7;
    }

    .reward-layer {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .reward-layer.show { opacity: 1; }

    .reward-bag {
      position: absolute;
      left: var(--reward-x, 50%);
      top: var(--reward-y, 35%);
      width: 110px;
      height: 110px;
      transform: translate(-50%, -50%) scale(.6);
      object-fit: contain;
      filter: drop-shadow(0 16px 18px rgba(67,42,18,.28));
    }

    .reward-layer.show .reward-bag { animation: rewardBag 2.1s ease forwards; }

    .reward-copy {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translateX(-50%);
      min-width: 210px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,251,239,.96);
      box-shadow: var(--shadow);
      text-align: center;
      font-size: 13px;
      font-weight: 1000;
    }

    .reward-nut {
      position: absolute;
      left: var(--reward-x, 50%);
      top: var(--reward-y, 35%);
      width: 21px;
      height: 21px;
      object-fit: contain;
      filter: drop-shadow(0 4px 5px rgba(67,42,18,.18));
      animation: rewardNut 1.25s ease-in forwards;
      animation-delay: var(--delay);
    }

    @keyframes rewardBag {
      0% { transform: translate(-50%, -50%) scale(.5); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.08) rotate(-3deg); opacity: 1; }
      38% { transform: translate(-50%, -50%) scale(1) rotate(3deg); }
      55%, 85% { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
      100% { transform: translate(-50%, -60%) scale(.88); opacity: 0; }
    }

    @keyframes rewardNut {
      0% { transform: translate(-50%, 0) rotate(0deg) scale(.5); opacity: 0; }
      20% { opacity: 1; }
      55% { transform: translate(calc(-50% + var(--spread)), -48px) rotate(220deg) scale(1); }
      100% { left: 91%; top: 5%; transform: translate(-50%, -50%) rotate(520deg) scale(.4); opacity: 0; }
    }

    .lantern-switch {
      position: absolute;
      z-index: 8;
      left: 76%;
      top: 51%;
      width: 54px;
      height: 70px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255, 221, 145, .08);
      cursor: pointer;
    }

    .lantern-switch::after {
      content: "";
      position: absolute;
      inset: 15px 12px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(255, 224, 157, .22);
      transition: box-shadow 1s ease, background 1s ease;
    }

    .lantern-switch.is-lit::after {
      background: rgba(255, 218, 126, .35);
      box-shadow: 0 0 20px 8px rgba(255, 194, 86, .35);
    }

    .inventory-panel {
      position: absolute;
      z-index: 32;
      left: 12px;
      right: 12px;
      bottom: 70px;
      max-height: 62%;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 15px;
      background: rgba(255, 249, 232, .97);
      box-shadow: 0 20px 44px rgba(65,42,21,.28);
      backdrop-filter: blur(16px);
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .inventory-panel.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .inventory-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .inventory-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .icon-close {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(90,66,45,.08);
      font-size: 20px;
    }

    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .inventory-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.58);
    }

    .inventory-item.locked { opacity: .48; }

    .inventory-name {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 1000;
    }

    .inventory-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .inventory-actions button {
      min-height: 32px;
      border-radius: 10px;
      background: rgba(255, 218, 133, .6);
      font-size: 11px;
      font-weight: 1000;
    }

    .inventory-actions button.secondary {
      background: rgba(101, 185, 209, .18);
    }

    .furniture-editing .furniture-layer { pointer-events: auto; }

    .furniture.is-editing {
      pointer-events: auto;
      cursor: grab;
      outline: 3px dashed rgba(242, 173, 59, .8);
      outline-offset: 4px;
      filter: drop-shadow(0 10px 18px rgba(242,173,59,.35));
      touch-action: none;
    }

    .swing-seat-group.is-editing {
      pointer-events: auto;
      cursor: grab;
      outline: 3px dashed rgba(242, 173, 59, .8);
      outline-offset: 4px;
      touch-action: none;
    }

    .placement-done {
      position: absolute;
      z-index: 34;
      left: 50%;
      bottom: 146px;
      transform: translateX(-50%);
      min-width: 126px;
      min-height: 42px;
      border-radius: 999px;
      background: #5f8e58;
      color: white;
      box-shadow: var(--shadow);
      font-weight: 1000;
      display: none;
    }

    .placement-done.show { display: block; }

    .pet-heart {
      position: absolute;
      z-index: 12;
      left: var(--heart-x);
      top: var(--heart-y);
      color: #ed797a;
      font-size: 24px;
      pointer-events: none;
      animation: petHeart 1.25s ease-out forwards;
    }

    @keyframes petHeart {
      from { opacity: 0; transform: translate(-50%, 10px) scale(.65); }
      25% { opacity: 1; }
      to { opacity: 0; transform: translate(calc(-50% + var(--heart-drift)), -58px) scale(1.1); }
    }

    .discovery-category {
      margin-top: 15px;
    }

    .discovery-category h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .discovery-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .discovery-card.compact {
      min-height: 92px;
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      position: relative;
    }

    .discovery-icon {
      font-size: 25px;
      line-height: 1;
      margin-bottom: 7px;
    }

    .discovery-badge {
      position: absolute;
      right: 6px;
      top: 6px;
      min-width: 21px;
      height: 21px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #f2ad3b;
      color: white;
      font-size: 9px;
      font-weight: 1000;
    }

    .weather,
    .profile {
      pointer-events: auto;
    }

    .weather {
      min-width: 104px;
      min-height: 50px;
      border-radius: 17px;
      display: grid;
      grid-template-columns: 31px 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      font-weight: 900;
      background: rgba(255, 250, 236, .68);
    }

    .sun {
      width: 29px;
      height: 29px;
      border-radius: 50%;
      background: #ffbe2e;
      box-shadow: 0 0 0 5px rgba(255, 190, 46, .18);
    }

    .time {
      display: block;
      margin-top: 1px;

      transform-origin: bottom center;

      transition: transform 1.5s ease-in-out;

      42% {

      68% {

      }
      100% {
        transform: translateY(var(--mode-y-offset, 0px)) scaleX(1) scaleY(1);

      text-shadow: 0 2px 7px rgba(232, 117, 114, .25);
    }

    .product-art {
      height: 82px;
      margin: 9px auto 7px;
      display: grid;
      place-items: center;
      position: relative;
    }

    .product-art span {
      display: grid;
      place-items: center;
      width: 76px;
      height: 64px;
      border-radius: 20px;
      background:
        radial-gradient(circle at 36% 28%, rgba(255,255,255,.72), transparent 34%),
        linear-gradient(145deg, #fff2cc, #e7bf7b);
      box-shadow: inset 0 -8px 14px rgba(124, 77, 32, .11), 0 9px 16px rgba(96, 63, 29, .14);
      font-size: 36px;
    }

    .art-perch span { border-radius: 50%; }
    .art-plants span { background: linear-gradient(145deg, #eff6dc, #d4a96f); }
    .art-bed span { border-radius: 50%; background: repeating-linear-gradient(90deg, #c6dfd8 0 10px, #fff0c9 10px 20px); }
    .art-lamp span { background: radial-gradient(circle, #ffe79a, #efd19e 45%, #524235 48%); }
    .art-wall span { background: linear-gradient(145deg, #bfe2e4, #f8ead0); }
    .art-food span { background: linear-gradient(145deg, #f9e2a5, #e8ba74); }
    .art-toy span { background: linear-gradient(145deg, #f2d6b1, #d7a468); }

    .product-desc {
      min-height: 39px;
      margin: 0 0 8px;
      color: #6d543b;
      font-size: 12px;
      line-height: 1.55;
      text-align: center;
      font-weight: 850;
    }

    .price {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 9px;
      font-size: 20px;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
    }

    .acorn {
      position: relative;
      display: inline-block;
      width: 18px;
      height: 20px;
      border-radius: 46% 46% 54% 54%;
      background: linear-gradient(145deg, #d87931, #a95d25);
      box-shadow: inset -3px -4px 5px rgba(84, 42, 14, .14);
      transform: rotate(-18deg);
      flex: 0 0 auto;
    }

    .acorn::before {
      content: "";
      position: absolute;
      left: -1px;
      top: -5px;
      width: 20px;
      height: 9px;
      border-radius: 50% 50% 38% 38%;
      background: #8f6d34;
    }

    .acorn::after {
      content: "";
      position: absolute;
      right: -4px;
      top: -8px;
      width: 10px;
      height: 8px;
      border-top: 3px solid #6d8a3e;
      border-radius: 50%;
      transform: rotate(26deg);
    }

    .buy-button {
      width: 100%;
      min-height: 34px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe3a9, #f6c772);
      color: #563b24;
      font-size: 13px;
      font-weight: 1000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
      transition: transform .16s ease, filter .16s ease;
    }

    .buy-button:disabled {
      opacity: .62;
      cursor: default;
    }

    .recommend {
      margin-top: 18px;
      padding-top: 13px;
      border-top: 1px solid rgba(101, 72, 43, .12);
    }

    .sets-row {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(210px, 72%);
      gap: 10px;
      overflow-x: auto;
      padding: 0 2px 6px;
      scroll-snap-type: x proximity;
      scrollbar-width: thin;
    }

    .set-card {
      scroll-snap-align: start;
      min-height: 104px;
      border-radius: 15px;
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 10px;
      padding: 9px;
      background: linear-gradient(180deg, rgba(255,252,244,.98), rgba(255,239,206,.94));
    }

    .set-preview {
      border-radius: 13px;
      background:
        linear-gradient(rgba(255,255,255,.14), rgba(255,255,255,.14)),
        url("assets/inko-dollhouse-bg.png");
      background-size: 240px auto;
      background-position: center;
      box-shadow: inset 0 0 0 1px rgba(101,72,43,.1);
    }

    .set-card h3 {
      margin: 2px 0 6px;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 1000;
      color: #397b73;
    }

    .set-icons {
      display: flex;
      gap: 5px;
      margin-bottom: 6px;
    }

    .set-icons span {
      width: 28px;
      height: 25px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255,255,255,.58);
      font-size: 15px;
    }

    .set-price {
      display: flex;
      gap: 7px;
      align-items: center;
      font-weight: 1000;
    }

    .badge {
      padding: 4px 6px;
      border-radius: 7px;
      background: #ff8e86;
      color: white;
      font-size: 10px;
      font-weight: 1000;
    }

    .nav-bar {
      left: 12px;
      right: 12px;
      bottom: max(8px, env(safe-area-inset-bottom));
      min-height: 56px;
      border-radius: 20px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      padding: 5px;
      background: rgba(255, 250, 236, .62);
      box-shadow: 0 10px 24px rgba(73, 52, 29, .12);
      z-index: 20;
    }

    .nav-item {
      position: relative;
      border-radius: 15px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 1px;
      background: transparent;
      font-size: 10px;
      font-weight: 1000;
      color: rgba(90, 66, 45, .82);
      transition: transform .16s ease, background .16s ease;
    }

    .nav-item.active {
      background: rgba(255, 222, 145, .48);
      color: var(--ink);
    }

    .nav-icon {
      font-size: 19px;
      line-height: 1;
    }

    .nav-notice {
      position: absolute;
      right: 15px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff725d;
    }

    .toast {
      left: 50%;
      bottom: 150px;
      transform: translateX(-50%) translateY(14px);
      z-index: 30;
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(255, 251, 239, .95);
      box-shadow: 0 12px 28px rgba(73, 49, 28, .18);
      font-weight: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .sparkles {
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .spark {
      position: absolute;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      background: #fff2a8;
      box-shadow: 0 0 14px rgba(255, 234, 116, .8);
      animation: sparkle .9s ease-out forwards;
    }

    @keyframes sparkle {
      from { opacity: 0; transform: translateY(18px) rotate(45deg) scale(.4); }
      35% { opacity: 1; }
      to { opacity: 0; transform: translateY(-42px) rotate(45deg) scale(1); }
    }

    .zzz-effect {
      position: absolute;
      z-index: 4;
      left: var(--zzz-x, 64%);
      top: var(--zzz-y, 20%);
      width: 74px;
      transform: translate(-50%, -50%);
      opacity: 0;
      filter: drop-shadow(0 8px 10px rgba(69, 47, 25, .1));
      transition: opacity .25s ease, left 1.5s ease, top 1.5s ease;
    }

    .zzz-effect.show {
      opacity: .95;
      animation: zzzFloat 2.8s ease-in-out infinite;
    }

    @keyframes zzzFloat {
      0%, 100% { transform: translate(-50%, -50%); }
      50% { transform: translate(-50%, -62%); }
    }

    .placeholder-card {
      left: 28px;
      right: 28px;
      top: 40%;
      transform: translateY(-50%);
      min-height: 170px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(255, 250, 236, .86);
    }

    .placeholder-card h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }

    .placeholder-card p {
      margin: 0;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .phone {
        width: 100vw;
        height: 100vh;
        aspect-ratio: auto;
        min-height: 690px;
      }

      .top-bar {
        left: 10px;
        right: 10px;
        gap: 7px;
      }

      .weather {
        min-width: 88px;
        min-height: 46px;
        grid-template-columns: 27px 1fr;
        padding: 7px 8px;
        font-size: 13px;
      }

      .sun { width: 26px; height: 26px; }

      .profile {
        min-width: 144px;
        min-height: 52px;
        grid-template-columns: 35px 1fr;
        padding: 7px 9px;
      }

      .avatar { width: 35px; height: 35px; }
      .name { font-size: 17px; }

      .left-rail {
        left: 10px;
        top: 84px;
      }

      .round-tool,
      .mood-button {
        width: 46px;
        height: 46px;
        font-size: 20px;
      }

      .mood-button {
        right: 10px;
        top: 72px;
      }

      .mood-panel {
        right: 10px;
        top: 124px;
        width: 140px;
      }

      .care-row {
        left: 10px;
        right: 10px;
        bottom: 67px;
        gap: 7px;
      }

      .care {
        min-height: 61px;
        border-radius: 19px;
      }

      .care-icon { font-size: 21px; }
      .care-label { font-size: 11px; }

      .shop-top {
        left: 10px;
        right: 10px;
        grid-template-columns: 46px 1fr 98px;
        gap: 7px;
      }

      .back-button {
        width: 46px;
        height: 46px;
      }

      .wood-sign {
        min-height: 86px;
        border-radius: 21px;
      }

      .wood-sign h1 { font-size: 28px; }
      .wood-sign p { font-size: 11px; }

      .nut-wallet {
        grid-template-columns: 28px 1fr;
        min-height: 52px;
        border-radius: 19px;
        padding: 8px;
      }

      .nut-wallet strong { font-size: 20px; }

      .shop-bird {
        right: 56px;
        top: 64px;
        width: 80px;
      }

      .perch-line {
        right: 45px;
        top: 110px;
        width: 100px;
      }

      .shop-tabs {
        left: 10px;
        right: 10px;
        top: 150px;
        min-height: 55px;
      }

      .category-tab {
        grid-template-columns: 20px auto;
        gap: 4px;
        font-size: 13px;
      }

      .tab-icon { font-size: 18px; }

      .shop-sheet {
        left: 10px;
        right: 10px;
        top: 199px;
        bottom: 60px;
        padding: 16px 10px 14px;
      }

      .product-grid {
        gap: 8px;
      }

      .product-card {
        min-height: 223px;
        padding: 11px 8px 9px;
      }

      .product-title { font-size: 13px; }
      .product-art { height: 76px; }
      .product-art span { width: 68px; height: 58px; font-size: 32px; }
      .product-desc { font-size: 11px; }
      .price { font-size: 18px; }

      .nav-bar {
        left: 8px;
        right: 8px;
        min-height: 52px;
        border-radius: 18px;
      }

      .nav-icon { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="もっちんの部屋">
    <section class="screen active" id="homeScreen" aria-label="ホーム">
      <div class="room"></div>

        <img class="furniture bed" data-furniture="bed" src="assets/home/bed.png" alt="" />
        <img class="furniture toy" id="toyFigure" data-furniture="toy" src="assets/home/toy.png" alt="木のおもちゃ" role="button" tabindex="0" />
        <img class="furniture toy2" id="toy2Figure" data-furniture="toy2" src="assets/home/toy2.png" alt="鳥型の車輪おもちゃ" role="button" tabindex="0" />
        <img class="furniture swing swing-fixed" data-furniture="swing" src="assets/home/swing.png" alt="" />

        <img class="furniture food" data-furniture="food" src="assets/home/food.png" alt="" />
